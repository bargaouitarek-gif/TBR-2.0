<style>
:root{--tbr-red:#E8001D;--tbr-bg:#F3F4F6;--tbr-card:#FFFFFF;--tbr-text:#111111;--tbr-muted:#6B7280;--tbr-soft:#F9FAFB;--tbr-border:rgba(17,17,17,0.06);--tbr-shadow:0 14px 40px rgba(17,17,17,0.08);--tbr-radius:24px;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:var(--tbr-bg);color:var(--tbr-text);font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Inter","Segoe UI",sans-serif;overscroll-behavior:none}
input,select,button,textarea{font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Inter",sans-serif}
::-webkit-scrollbar{width:0}
select{-webkit-appearance:none}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
@keyframes j-pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}
.j-pulse{animation:j-pulse 2.4s ease-in-out infinite}
.tbr-page{max-width:430px;margin:0 auto;padding:18px 16px 96px}
.tbr-topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.tbr-title{font-size:28px;font-weight:900;letter-spacing:-0.8px}
.tbr-subtitle{font-size:13px;font-weight:700;color:var(--tbr-muted)}
.tbr-card{background:var(--tbr-card);border:1px solid var(--tbr-border);border-radius:var(--tbr-radius);box-shadow:var(--tbr-shadow);padding:18px;margin-bottom:14px}
.tbr-hero{background:linear-gradient(145deg,#ffffff 0%,#fff2f4 100%);border-radius:30px;padding:24px 20px;box-shadow:0 18px 45px rgba(232,0,29,0.14);margin-bottom:14px}
.tbr-hero-label{font-size:13px;font-weight:800;color:var(--tbr-muted);margin-bottom:8px}
.tbr-hero-value{font-size:54px;line-height:0.95;font-weight:900;letter-spacing:-2px;color:var(--tbr-text)}
.tbr-hero-status{margin-top:12px;display:inline-flex;align-items:center;gap:8px;padding:8px 12px;border-radius:999px;background:rgba(232,0,29,0.08);color:var(--tbr-red);font-size:12px;font-weight:900}
.tbr-pill-row{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;margin-top:18px}
.tbr-pill{background:rgba(255,255,255,0.78);border:1px solid rgba(17,17,17,0.06);border-radius:18px;padding:11px 8px;text-align:center}
.tbr-pill-value{font-size:21px;font-weight:900;letter-spacing:-0.4px}
.tbr-pill-label{margin-top:2px;font-size:10px;font-weight:800;color:var(--tbr-muted)}
.tbr-progress-head{display:flex;justify-content:space-between;align-items:flex-end;margin-top:18px;margin-bottom:8px;font-size:12px;font-weight:800;color:var(--tbr-muted)}
.tbr-progress{height:10px;border-radius:999px;background:rgba(17,17,17,0.08);overflow:hidden}
.tbr-progress-fill{height:100%;border-radius:999px;background:var(--tbr-red);transition:width 0.4s ease}
.tbr-section-title{font-size:16px;font-weight:900;letter-spacing:-0.3px;margin-bottom:12px}
.tbr-jumper{background:#111111;color:white;border-radius:28px;padding:20px;box-shadow:0 18px 45px rgba(0,0,0,0.22);margin-bottom:14px}
.tbr-jumper-top{display:flex;align-items:center;gap:14px;margin-bottom:14px}
.tbr-jumper-avatar{width:54px;height:54px;border-radius:18px;background:linear-gradient(145deg,#E8001D,#ff5a6a);display:flex;align-items:center;justify-content:center;font-size:26px;flex-shrink:0;animation:j-pulse 2.4s ease-in-out infinite}
.tbr-jumper-title{font-size:20px;font-weight:900;letter-spacing:-0.4px}
.tbr-jumper-subtitle{font-size:13px;color:rgba(255,255,255,0.68);font-weight:700;margin-top:2px}
.tbr-jumper-message{font-size:14px;line-height:1.45;color:rgba(255,255,255,0.86)}
.tbr-palier-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.tbr-palier{background:var(--tbr-soft);border-radius:20px;padding:14px;border:1px solid var(--tbr-border)}
.tbr-palier-label{font-size:11px;font-weight:800;color:var(--tbr-muted);margin-bottom:8px}
.tbr-palier-value{font-size:24px;font-weight:900;letter-spacing:-0.6px}
.tbr-secondary{opacity:0.92}
.tbr-bottom-nav{position:fixed;left:50%;bottom:14px;transform:translateX(-50%);width:calc(100% - 24px);max-width:430px;background:rgba(255,255,255,0.94);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);border:1px solid var(--tbr-border);border-radius:26px;box-shadow:0 12px 35px rgba(0,0,0,0.16);display:grid;grid-template-columns:repeat(5,1fr);padding:8px;z-index:999}
.tbr-nav-item{text-align:center;font-size:10px;font-weight:800;color:var(--tbr-muted);padding:8px 4px;border-radius:18px;border:none;background:transparent;cursor:pointer;width:100%}
.tbr-nav-icon{font-size:18px;line-height:1;margin-bottom:3px}
.tbr-nav-item.active{color:var(--tbr-red);background:#FFF1F2}
</style>

<style id="tbr-responsive-global-v8">
/* Patch responsive global — mobile, tablette, ordinateur */
:root{
  --tbr-bottom-safe: calc(132px + env(safe-area-inset-bottom));
  --tbr-viewport-h: 100dvh;
}

html,body,#root{
  width:100%!important;
  max-width:100%!important;
  min-height:var(--tbr-viewport-h)!important;
  overflow-x:hidden!important;
  box-sizing:border-box!important;
}

*,*::before,*::after{box-sizing:border-box!important;}

body{
  touch-action:manipulation;
  -webkit-text-size-adjust:100%;
}

.tbr-shell{
  width:100%!important;
  max-width:none!important;
  min-height:var(--tbr-viewport-h)!important;
  overflow-x:hidden!important;
  position:relative!important;
}

.tbr-topbar{
  width:100%!important;
  max-width:none!important;
  padding-left:max(12px,env(safe-area-inset-left))!important;
  padding-right:max(12px,env(safe-area-inset-right))!important;
}

.tbr-topbar-inner{
  width:100%!important;
  max-width:1180px!important;
  margin:0 auto!important;
  padding-left:0!important;
  padding-right:0!important;
  gap:12px!important;
}

.tbr-page{
  width:100%!important;
  max-width:1180px!important;
  margin:0 auto!important;
  padding-left:clamp(12px,2.2vw,28px)!important;
  padding-right:clamp(12px,2.2vw,28px)!important;
  padding-bottom:var(--tbr-bottom-safe)!important;
  overflow-x:hidden!important;
}

.tbr-page > *{min-width:0!important;}

input,select,textarea,button{
  max-width:100%!important;
  font-size:16px!important; /* évite le zoom iPhone au focus */
}

input,select,textarea{
  scroll-margin-top:120px!important;
  scroll-margin-bottom:190px!important;
}

.deck-field-row{
  min-width:0!important;
}

.deck-field-row > div{
  min-width:0!important;
}

.deck-seg{
  min-width:0!important;
  overflow-x:auto!important;
  -webkit-overflow-scrolling:touch!important;
}

.deck-seg button{
  min-width:max-content!important;
}

.tbr-bottom-nav{
  left:max(10px,env(safe-area-inset-left))!important;
  right:max(10px,env(safe-area-inset-right))!important;
  bottom:calc(10px + env(safe-area-inset-bottom))!important;
  width:auto!important;
  max-width:1180px!important;
  margin:0 auto!important;
  z-index:999!important;
}

.tbr-nav-btn{
  min-width:0!important;
}

.tbr-nav-btn div:last-child{
  overflow:hidden!important;
  text-overflow:ellipsis!important;
}

/* Clavier ouvert : ajoute de l'espace pour que le champ ne reste jamais caché */
body.tbr-keyboard-open .tbr-page{
  padding-bottom:calc(260px + env(safe-area-inset-bottom))!important;
}

body.tbr-keyboard-open .tbr-bottom-nav{
  transform:translateY(110%)!important;
  opacity:.12!important;
  pointer-events:none!important;
}

/* Les gros graphiques restent scrollables horizontalement sans casser la page */
.terminal-scroll,.flight-chart-scroll{
  max-width:100%!important;
  overflow-x:auto!important;
  overflow-y:hidden!important;
  -webkit-overflow-scrolling:touch!important;
  overscroll-behavior-x:contain!important;
}

.terminal-svg,.flight-svg{
  max-width:none!important;
}

/* Mobile vertical */
@media (max-width: 599px){
  .tbr-topbar-inner{
    align-items:center!important;
  }

  .tbr-topbar-inner > div:first-child{
    min-width:0!important;
    flex:1 1 auto!important;
  }

  .tbr-topbar-inner > div:first-child img[alt="TBR"]{
    width:62px!important;
    height:62px!important;
    border-radius:20px!important;
  }

  .tbr-topbar-inner > div:first-child > div:first-child{
    padding:5px!important;
    border-radius:22px!important;
    flex-shrink:0!important;
  }

  .tbr-topbar-inner > div:last-child{
    flex:0 0 auto!important;
    max-width:118px!important;
  }

  .tbr-page{
    padding-top:12px!important;
  }

  .flight-main-grid,
  .flight-bottom-grid,
  .terminal-kpis,
  .terminal-week-grid,
  .terminal-date-grid,
  .flight-selected-bar,
  .terminal-selected{
    grid-template-columns:1fr!important;
  }

  .flight-instruments{
    grid-template-columns:repeat(3,minmax(0,1fr))!important;
  }

  .flight-money-panel b,
  .v8-money{
    font-size:clamp(38px,12vw,58px)!important;
  }

  .deck-field-row{
    display:block!important;
  }

  .deck-field-row label{
    display:block!important;
    max-width:100%!important;
    margin-bottom:7px!important;
  }

  .deck-field-row > div{

<style id="tbr-v8-million-ui">
/* TBR V8 — refonte premium, sobre, fonctionnelle. Pas de rose/bleu, pas de scroll cassé. */
:root{

body{

    radial-gradient(circle at 16% -8%, rgba(227,6,19,.09), transparent 32%),

#root{

// ── POPUP MISE À JOUR ──
function UpdatePopup(){
  const [remoteVersion,setRemoteVersion]=useState(null);
  const [snoozeUntil,setSnoozeUntil]=useState(0);
  const [show,setShow]=useState(()=>{
    const last=localStorage.getItem('cc_version');
    return last!==APP_VERSION;
  });

  const reload=()=>{
    localStorage.setItem('cc_version',APP_VERSION);
    const doReload=()=>window.location.replace(window.location.href.split('?')[0]+'?v='+Date.now());
    if('serviceWorker' in navigator){
      navigator.serviceWorker.getRegistrations().then(regs=>{
        const kills=regs.map(r=>r.unregister());
        return Promise.all(kills);
      }).then(()=>{
        if('caches' in window){
          return caches.keys().then(keys=>Promise.all(keys.map(k=>caches.delete(k))));
        }
      }).then(()=>doReload()).catch(()=>doReload());
    } else {
      doReload();
    }
  };

  useEffect(()=>{
    let alive=true;
    let timer=null;
    const current=APP_VERSION;
    const getIndexUrl=()=>{
      const url=new URL(window.location.href);
      url.search='';
      url.hash='';
      url.searchParams.set('tbr_update_check',Date.now().toString());
      return url.toString();
    };
    const check=async(reason='auto')=>{
      if(!alive) return;
      if(reason==='timer' && document.hidden) return;
      if(Date.now()<snoozeUntil) return;
      try{
        const res=await fetch(getIndexUrl(),{cache:'no-store',headers:{'Cache-Control':'no-cache'}});
        if(!res.ok) return;
        const txt=await res.text();
        const m=txt.match(/const\s+APP_VERSION\s*=\s*"([^"]+)"/);
        const remote=m&&m[1];
        if(remote && remote!==current){
          setRemoteVersion(remote);
          setShow(true);
        }
      }catch(e){}
    };
    window.tbrCheckUpdateNow=()=>check('manual');
    check('load');
    timer=setInterval(()=>check('timer'),120000);
    const onVisible=()=>{if(!document.hidden) check('visible');};
    const onFocus=()=>check('focus');
    const onPageShow=()=>check('pageshow');

function getIP(n){
  if(n>=6) return 1.0; if(n===5) return 0.9; if(n===4) return 0.8;
  if(n===3) return 0.7; if(n===2) return 0.6; if(n===1) return 0.5;

}

function getPalierVentes(n){
  if(n<7) return 0;
  if(n>=18) return 1000+Math.floor((n-18)/2)*150;
  const p={7:150,8:250,10:400,12:550,14:700,16:850,18:1000};
  let r=0; for(const[s,v] of Object.entries(p)) if(n>=+s) r=v; return r;
}

function getPalierVD(n){
  if(n<3) return 0;
  if(n>=10) return 1100+(n-10)*100;
  const p={3:400,4:500,5:600,6:700,7:800,8:900,9:1000,10:1100};
  let r=0; for(const[s,v] of Object.entries(p)) if(n>=+s) r=v; return r;
}

function getBonusSGP(statut,vn,vd){
  if(statut==="PLATINIUM"){
    if(vd>=8) return 500+Math.max(0,vd-8)*100;
    if(vn>=8&&vd>=5) return 250+Math.max(0,Math.min(vd,7)-5)*75;
    if(vn>=8&&vd>=4) return 200; return 0;
  }
  if(statut==="GOLD"){
    if(vn>=8&&vd>=5) return 200+Math.max(0,vd-5)*75;
    if(vn>=8&&vd>=4) return 150; return 0;
  }
  if(statut==="SILVER"){if(vn>=8&&vd>=4) return 100+Math.max(0,vd-4)*50; return 0;}
  return 0;
}

function calcIsoPartner(ca){
  ca=Number(ca)||0;

  if(ca<400) return 100;
  if(ca<500) return 120;
  if(ca<600) return 150;
  if(ca<700) return 180;
  if(ca<800) return 220;
  if(ca<900) return 240;
  if(ca<1000) return 260;
  if(ca<1100) return 300;
  return 300+Math.floor((ca-1000)/100)*20;
}
function calcFixePartner(type){
  if(type==="PRO") return {vente:120,install:60};
  if(type==="MAISON") return {vente:100,install:60};

}
function getPromoAboInfo(v,ip=1){
  const code=String(v&&v.codePromo||"").toUpperCase().replace(/\s+/g,"").trim();
  const months=["3MO5PO","3MO5POSTART"].includes(code)?3:["6MO5PO","6MO5POSTART"].includes(code)?6:0;
  if(!months) return {code,months:0,monthlyHT:0,deductionCAHT:0,commissionImpact:0,maintenanceTTC:0,telesurveillanceTTC:0};
  let monthlyHT=0,maintenanceTTC=0,telesurveillanceTTC=0;
  if(v&&v.typeClient==="PRO"){
    monthlyHT=Number(v.aboMensuelHT)||ABB_PRO_HT;
  }else{
    maintenanceTTC=Number(v&&v.aboMaintenanceTTC);
    telesurveillanceTTC=Number(v&&v.aboTelesurveillanceTTC);
    if(!(maintenanceTTC>0)||!(telesurveillanceTTC>=0)){
      maintenanceTTC=39.34;
      telesurveillanceTTC=13.56;
    }
    monthlyHT=(maintenanceTTC/1.10)+(telesurveillanceTTC/1.20);
  }
  const deductionCAHT=monthlyHT*0.50*months;
  const commissionImpact=deductionCAHT*0.25*(Number(ip)||1);
  return {code,months,monthlyHT,deductionCAHT,commissionImpact,maintenanceTTC,telesurveillanceTTC};
}

}

function calcCommission(v,ip){
  if(v.annulation) return{kit:0,bonus:0,packs:0,install:0,malus:0,total:0,caPacks:0,valCat:0,malusDetail:[],partner:false};
  if(v.partenaire){
    const nom=v.partenaireNom||"Leroy Merlin";
    const cfg=getPartnerConfig(nom);
    const cat=v.partenaireCategorie||((v.typeClient==="PRO")?"PRO":"APPARTEMENT");
    let vente=0, install=0, ca=Number(v.partenaireCA)||0;
    if(cfg.mode==="FIXE"){
      const fixe=calcFixePartner(cat);
      vente=fixe.vente;
      install=v.installation?fixe.install:0;
    }else{
      vente=calcIsoPartner(ca);
      install=v.installation?55:0;
    }
    const mode=cfg.mode==="FIXE"?"Fixe partenaire":"ISO partenaire";
    return{
      kit:0,bonus:vente,packs:0,install,malus:0,total:vente+install,caPacks:ca,valCat:0,malusDetail:[],
      partner:true,partnerName:nom,partnerMode:mode,partnerType:cat,
      partnerSale:vente,partnerInstall:install,partnerCA:ca,partnerNote:cfg.note
    };
  }
  const caPacks=(v.packs||[]).reduce((s,p)=>{
    if(p.statutMat==="Offert") return s;
    if(p.statutMat==="Remise -50%") return s+p.prixCatalogueHT*0.5;
    if(p.statutMat==="Remise -25%") return s+p.prixCatalogueHT*0.75;
    return s+p.prixCatalogueHT;
  },0);
  const valCat=(v.packs||[]).reduce((s,p)=>s+(p.prixCatalogueHT||0),0);
  const promoAbo=getPromoAboInfo(v,ip);
  const caPacksNet=caPacks-promoAbo.deductionCAHT;
  const kit=getKitCom(v.engagement,v.remsc)*ip;
  const bonus=getBonusVDVF(v.typeVente,v.typeClient,caPacks)*ip;
  const packs=caPacksNet*0.25*ip;
  const install=v.installation?(valCat>=400?60:40):0;
  let malus=0,malusDetail=[];
  const pv=(v.packs||[]).filter(p=>PACKS_VALIDES.includes(p.reference));
  let min=false;
  if(pv.length===0){min=true;malusDetail.push("Aucun pack valide → -40€");}
  else{
    const tm=pv.every(p=>{const mo=p.statutMat==="Offert";return(mo&&p.remiseAbo>=100)||(mo&&p.remiseAbo>=4);});
    if(tm){min=true;malusDetail.push("Pack(s) offert(s) intégralement → -40€");}
  }
  if(min) malus-=40;
  const off=(v.packs||[]).filter(p=>p.statutMat==="Offert").length;
  if(off>0){malus-=off*10;malusDetail.push(`${off} pack(s) offert(s) mat → -${off*10}€`);}

  const remiseAboPacks=(v.packs||[]).reduce((s,p)=>s+(Number(p.remiseAbo)||0),0);
  if(remiseAboPacks>0){
    const impRemise=remiseAboPacks*5;
    malus-=impRemise;
    malusDetail.push(`Remise abo pack ${remiseAboPacks}€/mois → -${impRemise}€`);
  }

  const codePromo=String(v.codePromo||"").toUpperCase().replace(/\s+/g,"").trim();
  if(promoAbo.months>0){
    malusDetail.push(`Code promo ${codePromo} → base packs -${promoAbo.deductionCAHT.toFixed(2)}€ HT · impact commission -${promoAbo.commissionImpact.toFixed(2)}€`);
  }else if(codePromo){
    malusDetail.push(`Code promo ${codePromo} → non reconnu, 0€`);
  }

  (v.codesAbo||[]).forEach(c=>{
    const ci=CODES_ABO.find(x=>x.code===c.code);
    const imp=ci?ci.impact:(10+(c.montant||0)*5);
    malus-=imp;malusDetail.push(`${c.code} → -${imp}€`);
  });
  return{kit,bonus,packs,install,malus,total:kit+bonus+packs+install+malus,caPacks,caPacksNet,promoAbo,valCat,malusDetail};
}

function getJumperSuggestion(syn,moisActif){
  const today=new Date();
  const jourMois=today.getDate();
  const totalJours=new Date(today.getFullYear(),today.getMonth()+1,0).getDate();
  const joursRestants=totalJours-jourMois;
  const heure=today.getHours();
  const isLundi=today.getDay()===1;
  const isSamedi=today.getDay()===6;

  let pvnNext=syn.vn+1; while(getPalierVentes(pvnNext)===getPalierVentes(syn.vn)&&pvnNext<60) pvnNext++;
  const manqV=Math.max(0,pvnNext-syn.vn);
  const gainV=getPalierVentes(pvnNext)-getPalierVentes(syn.vn);
  let pvdNext=syn.vd+1; while(getPalierVD(pvdNext)===getPalierVD(syn.vd)&&pvdNext<30) pvdNext++;
  const manqVD=Math.max(0,pvdNext-syn.vd);
  const gainVD=getPalierVD(pvdNext)-getPalierVD(syn.vd);
  const totalMalus=syn.details?syn.details.reduce((s,v)=>s+(v.result?v.result.malus:0),0):0;

  // Priorités enrichies avec chiffres concrets
  if(syn.ann>0) return "On regarde ensemble comment sécuriser les dossiers en cours ?";
  if(totalMalus<-20) return `${Math.abs(totalMalus).toFixed(0)}€ de malus détectés — on regarde ensemble ce qui peut être récupéré ?`;
  if(joursRestants<=3) return `Plus que ${joursRestants} jour(s) — on fait le point sur ce qu'on peut encore décrocher ?`;
  if(joursRestants<=7&&manqV<=2) return `${manqV} vente(s) pour +${gainV}€ de palier — on prépare un plan d'ici la fin de semaine ?`;
  if(manqVD===1) return `1 VD et tu déclenches +${gainVD}€ de palier — on cherche ensemble où la trouver ?`;
  if(manqV===1) return `1 vente pour +${gainV}€ de palier — on voit comment la décrocher aujourd'hui ?`;
  if(isLundi&&heure<14) return "Lundi matin — on planifie ta semaine pour maximiser tes commissions ?";
  if(isSamedi) return "On fait le bilan de la semaine et on prépare la suivante ?";
  if(heure>=7&&heure<10) return "Bonne fenêtre pour les pros — on prépare ton plan d'attaque ?";
  if(heure>=18) return "On prépare ton RDV de ce soir ou on débrieffe la journée ?";
  if(syn.vn===0) return "On établit une stratégie pour bien démarrer ce mois ?";
  if(syn.grand>2000) return `${fmt(syn.grand)} ce mois — on voit comment aller encore plus loin ?`;
  return "Tu veux qu'on simule un scénario ou analyser tes commissions ?";
}

  }

  const totalMalus=syn.details?syn.details.reduce((s,v)=>s+(v.result?v.result.malus:0),0):0;
  let pvnNext=syn.vn+1; while(getPalierVentes(pvnNext)===getPalierVentes(syn.vn)&&pvnNext<60) pvnNext++;
  const manqV=Math.max(0,pvnNext-syn.vn);
  const gainV=getPalierVentes(pvnNext)-getPalierVentes(syn.vn);
  let pvdNext=syn.vd+1; while(getPalierVD(pvdNext)===getPalierVD(syn.vd)&&pvdNext<30) pvdNext++;
  const manqVD=Math.max(0,pvdNext-syn.vd);
  const gainVD=getPalierVD(pvdNext)-getPalierVD(syn.vd);
  const bsgpActuel=getBonusSGP(agentStatut||'PLATINIUM',syn.vn,syn.vd);
  const bsgpPlusVD=getBonusSGP(agentStatut||'PLATINIUM',syn.vn,syn.vd+1);
  const gainBsgpVD=bsgpPlusVD-bsgpActuel;
  const ecartObjectif=objectifEuros>0?Math.max(0,objectifEuros-syn.grand):0;

  // Collection de tous les signaux détectés avec leur niveau
  const signaux=[];

  // ── NIVEAU 4 CRITIQUE (J-2 + objectif compromis + action unique dispo) ──
  if(joursRestants<=2&&ecartObjectif>0&&manqV<=2){
    const sim=simulerScenario(syn,agentStatut||'PLATINIUM',manqV,0);
    signaux.push({
      niveau:4,
      cause:`J-${joursRestants} — objectif compromis`,
      impact:`+${fmt(sim.gainTotal)} potentiel`,
      distance:`${manqV} vente(s)`,
      action:`Faire ${manqV} vente(s) aujourd'hui`,
      detail:`Tu es à ${fmt(syn.grand)}. Objectif : ${fmt(objectifEuros)}. Il reste ${joursRestants} jour(s).`
    });
  }

  // ── NIVEAU 3 ALERTE ──
  // J-5 objectif compromis
  if(joursRestants<=5&&ecartObjectif>200){
    const ventesRequises=Math.ceil(ecartObjectif/150);
    signaux.push({
      niveau:3,
      cause:`J-${joursRestants} — il manque ${fmt(ecartObjectif)}`,
      impact:`Objectif ${fmt(objectifEuros)}`,
      distance:`~${ventesRequises} vente(s)`,
      action:`Mobilise tout ton réseau maintenant`,
      detail:`Au rythme actuel, l'objectif est compromis. Il reste ${joursRestants} jour(s).`
    });
  }
  // Annulation impactante
  if(syn.ann>0&&joursRestants<=10){
    signaux.push({
      niveau:3,
      cause:`${syn.ann} annulation(s) en fin de période`,
      impact:`Palier ventes à risque`,
      distance:`Relance immédiate`,
      action:`Sécurise tes dossiers en cours`,
      detail:`Une annulation en fin de mois peut faire perdre un palier entier.`
    });
  }
  // Malus critiques
  if(totalMalus<-50){
    signaux.push({
      niveau:3,
      cause:`${Math.abs(totalMalus).toFixed(0)}€ de malus ce mois`,
      impact:`Argent perdu sur tes commissions`,
      distance:`Correction possible maintenant`,
      action:`Vérifie packs offerts et codes ABO`,
      detail:`Ces malus réduisent directement ta commission finale.`
    });
  }

  // ── NIVEAU 2 ATTENTION ──
  // Palier VD à 1 vente avec bon gain SGP
  if(manqVD===1&&(gainVD+gainBsgpVD)>=200){
    signaux.push({
      niveau:2,
      cause:`1 VD pour déclencher +${fmt(gainVD+gainBsgpVD)}`,
      impact:`Palier VD + bonus ${agentStatut||'PLATINIUM'}`,
      distance:`1 action`,
      action:`Trouve 1 prospect direct aujourd'hui`,
      detail:`${fmt(gainVD)} de palier VD + ${fmt(gainBsgpVD)} de bonus ${agentStatut||'PLATINIUM'}.`
    });
  }
  // Palier ventes à 1 vente
  if(manqV===1&&gainV>=150){
    signaux.push({
      niveau:2,
      cause:`1 vente pour +${fmt(gainV)} de palier`,
      impact:fmt(gainV),
      distance:`1 action`,
      action:`Appelle tes dossiers chauds maintenant`,
      detail:`Tu es à ${syn.vn} ventes. Le prochain palier se déclenche à ${pvnNext}.`
    });
  }
  // J-7 avec écart modéré
  if(joursRestants<=7&&ecartObjectif>0&&ecartObjectif<=300){
    signaux.push({
      niveau:2,
      cause:`J-${joursRestants} — encore ${fmt(ecartObjectif)} à combler`,
      impact:`Objectif atteignable`,
      distance:`1 à 2 ventes`,
      action:`Relance tes 3 meilleurs prospects`,
      detail:`L'objectif est encore atteignable avec du volume cette semaine.`
    });
  }

  // ── NIVEAU 1 OPPORTUNITÉ ──
  // Palier VD à 2 ventes
  if(manqVD<=2&&manqVD>0&&gainVD>=100){
    signaux.push({
      niveau:1,
      cause:`${manqVD} VD pour +${fmt(gainVD)}`,
      impact:fmt(gainVD),
      distance:`${manqVD} action(s)`,
      action:`Prospecte dans ton réseau cette semaine`,
      detail:`${manqVD} vente(s) directe(s) te donnent +${fmt(gainVD)} de palier VD.`
    });
  }
  // Palier ventes à 2-3 ventes
  if(manqV<=3&&manqV>1&&gainV>=100){
    signaux.push({
      niveau:1,
      cause:`${manqV} ventes pour +${fmt(gainV)}`,
      impact:fmt(gainV),
      distance:`${manqV} actions`,
      action:`Suis tes dossiers en cours`,
      detail:`${manqV} ventes suffisent pour atteindre le prochain palier.`
    });
  }

  // ── NIVEAU 0 — Si aucun signal ou mois excellent ──
  const excellent=syn.grand>=2500&&syn.vd>=6&&syn.ann===0&&joursRestants>5;
  if(excellent||signaux.length===0){
    return{
      niveau:0,
      cause:excellent?`${syn.vn} ventes · ${syn.vd} VD · ${fmt(syn.grand)}`:'Aucun signal fort détecté',
      impact:'',
      distance:'',
      action:'',
      detail:excellent?'Belle progression. Maintiens le rythme et sécurise les installations.':''
    };
  }

  // Règle : niveau affiché = niveau maximum détecté
  signaux.sort((a,b)=>b.niveau-a.niveau);
  const top=signaux[0];

  // Garde-fou ⚫ Critique
  if(top.niveau===4&&!canTriggerCritique()){
    top.niveau=3;
  }

  return top;
}

const TBR_AI_API_URL = "https://tbr-2-0-git-main-bargaouitarek-gifs-projects.vercel.app/api/ai";

function tbrAiFileToDataURL(file){
  return new Promise((resolve,reject)=>{
    const reader=new FileReader();
    reader.onload=()=>resolve(String(reader.result||""));
    reader.onerror=()=>reject(new Error("Impossible de lire le document."));
    reader.readAsDataURL(file);
  });
}

function tbrAiGetAccessCode(){
  let code=localStorage.getItem("tbr_ai_access_code")||"";
  if(!code){
    code=window.prompt("Entre ton code d'accès personnel TBR IA. Il restera enregistré uniquement sur ce téléphone.")||"";
    code=code.trim();
    if(code) localStorage.setItem("tbr_ai_access_code",code);
  }
  return code;
}

async function tbrAiRequest(payload){
  const code=tbrAiGetAccessCode();
  if(!code) throw new Error("Code d'accès TBR IA manquant.");
  const response=await fetch(TBR_AI_API_URL,{
    method:"POST",
    headers:{"Content-Type":"application/json","X-TBR-Access-Code":code},
    body:JSON.stringify(payload)
  });
  let data={};
  try{data=await response.json();}catch(e){}
  if(response.status===401){
    localStorage.removeItem("tbr_ai_access_code");
    throw new Error("Code d'accès incorrect. Rouvre l'IA et saisis le bon code.");
  }
  if(!response.ok) throw new Error(data.error||"Le serveur IA ne répond pas.");
  return data;
}

function TbrAiAssistant({tab,agent,moisActif,ventes,syn,aimt,ip}){
  const [open,setOpen]=useState(false);
  const [question,setQuestion]=useState("");
  const [loading,setLoading]=useState(false);
  const [file,setFile]=useState(null);
  const [messages,setMessages]=useState(()=>LD("tbr_ai_history_v1",[
    {role:"assistant",text:"Je suis l'assistant IA de TBR. Je peux lire un PV ou un DCO, contrôler les commissions et préparer une réclamation précise."}
  ]));
  const fileInput=useRef();
  const page=(TABS.find(t=>t.id===tab)||{}).label||"TBR";

  const saveMessages=next=>{const trimmed=next.slice(-18);setMessages(trimmed);SV("tbr_ai_history_v1",trimmed);};
  const buildContext=()=>({
    application:"TBR",version:APP_VERSION,pageActive:page,
    agent:{prenom:agent&&agent.prenom,statut:agent&&agent.statut,ventesMoisPrecedent:agent&&agent.ventesPrec},
    mois:moisActif,indicePerformance:Math.round(Number(ip||0)*100),
    synthese:{ventesNettes:syn&&syn.vn,ventesDirectes:syn&&syn.vd,annulations:syn&&syn.ann,commissionVentes:syn&&syn.totalCom,palierVentes:syn&&syn.pv,palierVD:syn&&syn.pvd,bonusSGP:syn&&syn.bsgp,total:syn&&syn.grand},
    aimt:aimt||null,
    ventes:(ventes||[]).map(v=>{let r={};try{r=calcCommission(v,ip)||{};}catch(e){}return{
      id:v.id,numClient:v.numClient,nomClient:v.nomClient,typeVente:v.typeVente,typeClient:v.typeClient,engagement:v.engagement,statut:v.statut,installation:v.installation,annulation:v.annulation,partenaire:v.partenaire,partenaireNom:v.partenaireNom,
      offre:v.offre||v.offrePV||null,packs:v.packs||[],calcul:{kit:r.kit||0,bonus:r.bonus||0,packs:r.packs||0,installation:r.install||0,malus:r.malus||0,total:r.total||0,valeurCatalogue:r.valCat||0}
    }}),
    dco:tbrCompactDco()
  });

  const send=async(forcedQuestion)=>{
    const ask=String(forcedQuestion||question||"").trim()||(file?"Analyse ce document et dis-moi exactement ce qu'il faut intégrer ou contrôler dans TBR.":"");
    if(!ask||loading)return;
    const userMsg={role:"user",text:file?`${ask}\nDocument joint : ${file.name}`:ask};
    const before=[...messages,userMsg];
    saveMessages(before);setQuestion("");setLoading(true);
    try{
      let filePayload=null;
      if(file){
        if(file.size>8*1024*1024) throw new Error("Le document dépasse 8 Mo.");
        filePayload={name:file.name,mimeType:file.type||"application/octet-stream",data:await tbrAiFileToDataURL(file)};
      }
      const result=await tbrAiRequest({
        message:ask,context:buildContext(),
        history:messages.slice(-8).map(m=>({role:m.role,text:m.text})),
        file:filePayload
      });
      saveMessages([...before,{role:"assistant",text:result.answer||"Réponse vide."}]);
      setFile(null);if(fileInput.current)fileInput.current.value="";
    }catch(e){
      saveMessages([...before,{role:"assistant",text:e.message||"Erreur IA.",error:true}]);
    }finally{setLoading(false);}
  };

  useEffect(()=>{if(open)setTimeout(()=>{const el=document.querySelector('.tbr-ai-messages');if(el)el.scrollTop=el.scrollHeight;},60);},[open,messages.length,loading]);

  return <>
    {!open&&<button className="tbr-ai-fab" onClick={()=>setOpen(true)} aria-label="Ouvrir l'IA TBR">✦</button>}
    {open&&<div className="tbr-ai-panel">
      <div className="tbr-ai-head"><div><b>IA TBR · connectée à OpenAI</b><small>Page active : {page} · connaît les données du mois</small></div><button className="tbr-ai-close" onClick={()=>setOpen(false)}>×</button></div>
      <div className="tbr-ai-messages">{messages.map((m,i)=><div key={i} className={`tbr-ai-msg ${m.role}${m.error?" error":""}`}>{m.text}</div>)}{loading&&<div className="tbr-ai-msg assistant">Analyse en cours…</div>}</div>
      <div className="tbr-ai-quick-global">{["Où est mon argent ?","Analyse mon DCO","Prépare une réclamation","Aide-moi à saisir ce PV"].map(q=><button key={q} onClick={()=>send(q)}>{q}</button>)}</div>
      {file&&<div className="tbr-ai-file"><span>📎 {file.name}</span><button onClick={()=>{setFile(null);if(fileInput.current)fileInput.current.value="";}}>Retirer</button></div>}
      <div className="tbr-ai-compose"><div className="tbr-ai-row">
        <label className="tbr-ai-attach" title="Joindre un PV, DCO ou une capture">📎<input ref={fileInput} type="file" accept="application/pdf,image/*" style={{display:"none"}} onChange={e=>setFile(e.target.files&&e.target.files[0]||null)}/></label>
        <textarea className="tbr-ai-input-global" value={question} onChange={e=>setQuestion(e.target.value)} onKeyDown={e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();send();}}} placeholder="Demande-moi n'importe quoi sur TBR…"/>
        <button className="tbr-ai-send" disabled={loading||(!question.trim()&&!file)} onClick={()=>send()}>Envoyer</button>
      </div><div className="tbr-ai-note">La clé OpenAI reste sécurisée sur Vercel. Elle n'est jamais envoyée au navigateur.</div></div>
    </div>}
  </>;
}

        {tab===1&&<SaisieView ventes={ventes} setVentes={setVentes} ip={ip} draftVente={draftVente} setDraftVente={setDraftVente} challenges={challenges} setChallenges={setChal} editRequest={dcoEditRequest} onEditDone={finishDcoEdit}/>}

}


function getMoisProgress(moisActif){
  const now=new Date();
  const annee=moisActif&&moisActif.annee?moisActif.annee:now.getFullYear();
  const mois=moisActif&&moisActif.mois?moisActif.mois:now.getMonth()+1;
  const totalJours=new Date(annee,mois,0).getDate();
  const isCurrent=annee===now.getFullYear()&&mois===now.getMonth()+1;
  const isPast=annee<now.getFullYear()||(annee===now.getFullYear()&&mois<now.getMonth()+1);
  const jourMois=isCurrent?now.getDate():(isPast?totalJours:1);
  const joursRestants=Math.max(0,totalJours-jourMois);
  const pctTemps=Math.min(100,Math.round((jourMois/totalJours)*100));
  return{annee,mois,totalJours,jourMois,joursRestants,pctTemps,isCurrent,isPast};
}

// ── Simulation "si je fais N ventes/VD de plus" ──
function simulerScenario(syn,agentStatut,plusVentes,plusVD){
  const vnSim=syn.vn+plusVentes;
  const vdSim=syn.vd+plusVD;
  const pvSim=getPalierVentes(vnSim);
  const pvdSim=getPalierVD(vdSim);
  const bsgpSim=getBonusSGP(agentStatut,vnSim,vdSim);
  // Commission kits estimée : moyenne des commissions actuelles * nouvelles ventes
  const comKitMoy=syn.vn>0?(syn.totalCom/syn.vn):130;
  const comKitAdd=comKitMoy*(plusVentes+plusVD);
  const totalSim=syn.totalCom+comKitAdd+pvSim+pvdSim+bsgpSim+(syn.totalChall||0);
  const gainTotal=totalSim-syn.grand;
  return{vnSim,vdSim,pvSim,pvdSim,bsgpSim,totalSim,gainTotal};
}

function getJumperCoachPlan(syn,moisActif,objectifEuros,objectifVentes,objectifVD,rdvVFMois,moisConfig,agentStatut){
  const progress=getMoisProgress(moisActif);
  // Utiliser les dates commerciales si disponibles, sinon fallback calendaire
  let joursEcoules,totalJours;
  if(moisConfig&&moisConfig.debut&&moisConfig.fin){
    const today=new Date();
    const debutD=new Date(moisConfig.debut);
    const finD=new Date(moisConfig.fin);
    const diffFin=finD-debutD;
    totalJours=Math.max(1,Math.round(diffFin/(1000*60*60*24))+1);
    const diffEcoule=today-debutD;
    joursEcoules=Math.max(1,Math.min(Math.round(diffEcoule/(1000*60*60*24))+1,totalJours));
  } else {
    joursEcoules=Math.max(3,progress.jourMois);
    totalJours=progress.totalJours;
  }
  const jour=joursEcoules;
  const joursRestants=Math.max(1,totalJours-jour);
  const projection=syn.vn===0?0:Math.round((syn.grand||0)/jour*totalJours);
  const projectionVentes=syn.vn===0?0:Math.round((syn.vn||0)/jour*totalJours);
  const projectionVD=syn.vd===0?0:Math.round((syn.vd||0)/jour*totalJours);
  const objV=objectifVentes||10;
  const objVD=objectifVD||6;
  const objectifRestant=objectifEuros>0?Math.max(0,objectifEuros-(syn.grand||0)):0;
  const ecartProjection=objectifEuros>0?projection-objectifEuros:0;
  const totalMalus=syn.details?syn.details.reduce((s,v)=>s+(v.result?v.result.malus:0),0):0;
  const nonInstalles=syn.details?syn.details.filter(v=>v.statut!=="Installe"&&!v.annulation).length:0;
  const vfCount=syn.details?syn.details.filter(v=>v.typeVente==="VF"&&!v.annulation).length:0;
  const rdvVF=parseInt(rdvVFMois||0);
  const tauxVF=rdvVF>0?Math.round((vfCount/rdvVF)*100):null;
  let pvnNext=syn.vn+1; while(getPalierVentes(pvnNext)===getPalierVentes(syn.vn)&&pvnNext<60) pvnNext++;
  const manqV=Math.max(0,pvnNext-syn.vn);
  const gainV=getPalierVentes(pvnNext)-getPalierVentes(syn.vn);
  let pvdNext=syn.vd+1; while(getPalierVD(pvdNext)===getPalierVD(syn.vd)&&pvdNext<30) pvdNext++;
  const manqVD=Math.max(0,pvdNext-syn.vd);
  const gainVD=getPalierVD(pvdNext)-getPalierVD(syn.vd);

  // ── Rythme journalier requis ──
  const ventesParJourActuel=syn.vn>0?(syn.vn/jour):0;
  const ventesParJourRequis=objV>syn.vn&&joursRestants>0?((objV-syn.vn)/joursRestants):0;
  const rythmeOK=ventesParJourActuel>=ventesParJourRequis;

  // ── Bonus SGP actuel et potentiel ──
  const statutA=agentStatut||"PLATINIUM";
  const bsgpActuel=getBonusSGP(statutA,syn.vn,syn.vd);
  const bsgpNext=getBonusSGP(statutA,syn.vn+1,syn.vd+1);
  const gainBsgp=bsgpNext-bsgpActuel;

  // ── Scénarios simulés ──
  const sim1V=simulerScenario(syn,statutA,1,0);
  const sim2V=simulerScenario(syn,statutA,2,0);
  const sim1VD=simulerScenario(syn,statutA,0,1);
  const sim1V1VD=simulerScenario(syn,statutA,1,1);

  const actions=[];
  if(syn.ann>0) actions.push({type:"Risque",label:`${syn.ann} annulation(s)`,detail:"Sécurise les dossiers fragiles avant de chercher uniquement du volume.",color:"#C62828"});
  if(totalMalus<0) actions.push({type:"Argent perdu",label:`${Math.abs(totalMalus).toFixed(0)}€ de malus`,detail:"Contrôle les packs offerts et les codes ABO qui réduisent ta commission.",color:"#E65100"});
  if(manqV>0&&manqV<=2) actions.push({type:"Opportunité",label:`${manqV} vente(s) = +${fmt(gainV)}`,detail:`Palier ventes + simulation : +${manqV} vente(s) → total estimé ${fmt(manqV===1?sim1V.totalSim:sim2V.totalSim)} ce mois.`,color:"#E8001D"});
  if(manqVD>0&&manqVD<=2) actions.push({type:"VD",label:`${manqVD} VD = +${fmt(gainVD)}`,detail:`1 VD → total estimé ${fmt(sim1VD.totalSim)} ce mois. Les VD font monter ton palier propre.`,color:"#1565C0"});
  if(objectifEuros>0&&ecartProjection<0) actions.push({type:"Objectif",label:`Projection ${fmt(projection)}`,detail:`Il manque ~${fmt(Math.abs(ecartProjection))} au rythme actuel. Besoin de ${ventesParJourRequis.toFixed(2)} vente/jour sur ${joursRestants} jour(s).`,color:"#C62828"});
  if(!rythmeOK&&syn.vn>0&&objectifEuros===0) actions.push({type:"Rythme",label:`${ventesParJourRequis.toFixed(2)} vente/j requis`,detail:`Rythme actuel : ${ventesParJourActuel.toFixed(2)} v/j. Il faut accélérer pour atteindre ${objV} ventes.`,color:"#F57F17"});
  if(gainBsgp>0&&(manqV<=2||manqVD<=2)) actions.push({type:"Bonus "+statutA,label:`+${fmt(gainBsgp)} potentiel`,detail:`1 vente + 1 VD supplémentaires → total estimé ${fmt(sim1V1VD.totalSim)} avec bonus ${statutA}.`,color:"#6A0DAD"});
  if(nonInstalles>0) actions.push({type:"Installation",label:`${nonInstalles} vente(s) à suivre`,detail:"Une vente non installée reste un risque : verrouille les dates d'installation.",color:"#F57F17"});
  if(rdvVF>0&&tauxVF!==null&&tauxVF<50) actions.push({type:"VF",label:`Taux VF ${tauxVF}%`,detail:"Reprends les RDV VF non transformés dans les 48h et analyse les objections.",color:"#C62828"});
  if(actions.length===0&&syn.vn===0) actions.push({type:"Démarrage",label:"Première vente",detail:"Objectif simple : créer l'élan avec un dossier propre aujourd'hui.",color:"#E8001D"});
  if(actions.length===0) actions.push({type:"Maintien",label:"Rythme propre",detail:"Continue à sécuriser les installations et cherche le prochain palier rentable.",color:"#2E7D32"});
  const status=objectifEuros>0?(ecartProjection>=0?"en avance":"en retard"):(syn.vn>=objV?"objectif ventes atteint":syn.vn>=Math.round(objV*0.7)?"bon rythme":"à accélérer");
  return{...progress,joursRestants,projection,projectionVentes,projectionVD,objectifRestant,ecartProjection,totalMalus,nonInstalles,rdvVF,tauxVF,manqV,gainV,manqVD,gainVD,ventesParJourActuel,ventesParJourRequis,rythmeOK,sim1V,sim2V,sim1VD,sim1V1VD,gainBsgp,actions:actions.slice(0,3),status};
}




function SyntheseView({syn,agent,moisActif,objectifEuros,setObjectifEuros,objectifVentes,objectifVD,objectifTauxVF,rdvVFMois,setRdvVFMois,moisConfig=null}){
  const status=(agent&&agent.statut)||"PLATINIUM";
  const objV=objectifVentes||20;
  const objVD=objectifVD||12;
  const objectifCom=objectifEuros||Math.max(5000,Math.ceil(((syn&&syn.grand)||0)/500)*500);
  const safeDetails=((syn&&syn.details)||[]).filter(v=>!v.annulation);
  const totalVentesAccueil=safeDetails.length||((syn&&syn.vn)||0);
  const ventesInstalleesAccueil=safeDetails.filter(v=>v.statut==="Installe").length;
  const tauxInstallAccueil=totalVentesAccueil>0?Math.round((ventesInstalleesAccueil/totalVentesAccueil)*100):0;
  const vfCount=safeDetails.filter(v=>v.typeVente==="VF").length;
  const rdvVFCount=parseInt(rdvVFMois||0);
  const tauxVFAccueil=rdvVFCount>0?Math.round((vfCount/rdvVFCount)*100):0;
  const objTauxVF=objectifTauxVF||50;
  const objectifRestantAccueil=objectifEuros>0?Math.max(0,(objectifEuros||0)-((syn&&syn.grand)||0)):0;
  const [selected,setSelected]=useState(null);

  function parseLocalDate(v){
    if(!v) return null;
    const d=new Date(String(v).slice(0,10)+"T00:00:00");
    return isNaN(d.getTime())?null:d;
  }
  function clamp(n,min,max){return Math.max(min,Math.min(max,n));}
  function iso(d){return d.toISOString().slice(0,10);}
  function periodInfo(){
    let start=parseLocalDate(moisConfig&&moisConfig.debut);
    let end=parseLocalDate(moisConfig&&moisConfig.fin);
    if(!start) start=new Date(moisActif.annee,moisActif.mois-1,1);
    if(!end) end=new Date(moisActif.annee,moisActif.mois,0);
    if(end<start){start=new Date(moisActif.annee,moisActif.mois-1,1);end=new Date(moisActif.annee,moisActif.mois,0);}
    const today=new Date();
    const today0=new Date(today.getFullYear(),today.getMonth(),today.getDate());
    const total=Math.max(1,Math.round((end-start)/86400000)+1);
    let day;
    if(today0<start) day=1;
    else if(today0>end) day=total;
    else day=clamp(Math.round((today0-start)/86400000)+1,1,total);
    return {start,end,total,day,remaining:Math.max(0,total-day),pct:Math.round((day/total)*100),today0};
  }
  function dayLabel(d){return d.toLocaleDateString("fr-FR",{weekday:"short",day:"2-digit",month:"short"}).replace(".","");}
  function dayShort(d){return d.toLocaleDateString("fr-FR",{weekday:"short"}).replace(".","");}
  function dateShort(d){return d.toLocaleDateString("fr-FR",{day:"2-digit",month:"short"}).replace(".","");}
  function cumul(arr){let s=0;return arr.map(v=>{s+=Number(v)||0;return s;});}
  function pct(v,o){return Math.max(0,Math.min(100,Math.round(((v||0)/Math.max(1,o||0))*100)));}

  const period=periodInfo();
  const totalDays=period.total;
  const dailySales=new Array(totalDays).fill(0);
  const dailyVD=new Array(totalDays).fill(0);
  const dailyCom=new Array(totalDays).fill(0);
  const dailyClients=new Array(totalDays).fill(0).map(()=>[]);

  safeDetails.forEach(v=>{
    const d=parseLocalDate(v.dateVente);
    if(!d) return;
    const idx=Math.round((d-period.start)/86400000);
    if(idx>=0&&idx<totalDays){
      dailySales[idx]+=1;
      if(v.typeVente==="VD") dailyVD[idx]+=1;
      dailyCom[idx]+=v.result?(v.result.total||0):0;
      dailyClients[idx].push(v.numClient?String(v.numClient):(v.nomClient||"Client"));
    }
  });

  const salesCum=cumul(dailySales);
  const vdCum=cumul(dailyVD);
  let c=0,cv=0,cvd=0;
  const comCum=dailyCom.map((v,i)=>{
    c+=Number(v)||0;cv+=dailySales[i]||0;cvd+=dailyVD[i]||0;
    return Math.round((c+getPalierVentes(cv)+getPalierVD(cvd)+getBonusSGP(status,cv,cvd))*100)/100;
  });
  if(comCum.length) comCum[comCum.length-1]=Math.max(comCum[comCum.length-1],syn.grand||0);

  const todayIdx=clamp(period.day-1,0,totalDays-1);
  const elapsed=Math.max(1,period.day);
  const projV=syn.vn?Math.round((syn.vn/elapsed)*totalDays):0;
  const projVD=syn.vd?Math.round((syn.vd/elapsed)*totalDays):0;
  const projCom=syn.grand?Math.round((syn.grand/elapsed)*totalDays):0;
  const resteV=Math.max(0,objV-syn.vn);
  const resteVD=Math.max(0,objVD-syn.vd);
  const needPerDay=Math.max(0,resteV/Math.max(1,period.remaining));
  const plan=getJumperCoachPlan(syn,moisActif,objectifEuros,objV,objVD,rdvVFMois,moisConfig,status);
  const moyenneTotaleVente=syn.vn>0?Math.round((syn.grand||0)/syn.vn):0;
  const onTrack=projV>=objV;
  const warning=!onTrack||projVD<objVD;

  const days=Array.from({length:totalDays},(_,i)=>{
    const d=new Date(period.start);
    d.setDate(period.start.getDate()+i);
    return {
      date:d,
      label:dayLabel(d),
      sales:dailySales[i],
      vd:dailyVD[i],
      com:dailyCom[i],
      cum:salesCum[i]||0,
      cumVD:vdCum[i]||0,
      cumCom:comCum[i]||0,
      clients:dailyClients[i]
    };
  });

  const selectedDay=(selected!==null&&days[selected])?days[selected]:days[todayIdx];
  const maxDaily=Math.max(1,...dailySales);
  const maxY=Math.max(1,objV,projV,...salesCum);
  const W=Math.max(920,totalDays*46);
  const H=286;
  const L=56;
  const R=24;
  const T=24;
  const B=70;
  const CW=W-L-R;
  const CH=H-T-B;
  const xFor=i=>L+(totalDays<=1?0:(i/(totalDays-1))*CW);
  const yFor=v=>T+CH-(Math.max(0,Number(v)||0)/maxY)*CH;
  const actualPts=days.map((d,i)=>xFor(i).toFixed(1)+","+yFor(d.cum).toFixed(1)).join(" ");
  const targetPts=days.map((d,i)=>xFor(i).toFixed(1)+","+yFor(objV*((i+1)/totalDays)).toFixed(1)).join(" ");
  const todayX=xFor(todayIdx);
  const actualToday=days[todayIdx]?days[todayIdx].cum:0;
  const projPts=todayX.toFixed(1)+","+yFor(actualToday).toFixed(1)+" "+(L+CW).toFixed(1)+","+yFor(projV).toFixed(1);
  const yTicks=[0,.25,.5,.75,1].map(p=>Math.round(maxY*p));

  function Gauge({label,value,target,sub,tone}){
    const p=pct(value,target);
    return(
      <div className={("flight-gauge "+(tone||""))}>
        <div className="flight-gauge-ring" style={{background:"conic-gradient(from -110deg, #38bdf8 0deg, #38bdf8 "+(p*2.2)+"deg, rgba(148,163,184,.18) "+(p*2.2)+"deg, rgba(148,163,184,.18) 240deg, transparent 240deg)"}}>
          <div>
            <b>{value}</b>
            <span>/ {target}</span>
          </div>
        </div>
        <strong>{label}</strong>
        <small>{sub}</small>
      </div>
    );
  }

  function GaugePercent({label,value,target,sub,tone,empty}){
    const p=empty?0:pct(value,target);
    return(
      <div className={("flight-gauge "+(tone||""))}>
        <div className="flight-gauge-ring" style={{background:"conic-gradient(from -110deg, #38bdf8 0deg, #38bdf8 "+(p*2.2)+"deg, rgba(148,163,184,.18) "+(p*2.2)+"deg, rgba(148,163,184,.18) 240deg, transparent 240deg)"}}>
          <div>
            <b className="percent-value">{empty?"—":value+"%"}</b>
            <span>{empty?"":"obj. "+target+"%"}</span>
          </div>
        </div>
        <strong>{label}</strong>
        <small>{sub}</small>
      </div>
    );
  }

  return(
    <div className="flight-home">
      <section className="flight-hero">
        <div className="flight-hud-lines"></div>
        <div className="flight-topline">
          <div>
            <p className="flight-period-line">Mois commercial · {period.start.toLocaleDateString("fr-FR",{day:"2-digit",month:"long"})} → {period.end.toLocaleDateString("fr-FR",{day:"2-digit",month:"long",year:"numeric"})}</p>
          </div>
          <div className={("flight-status "+(onTrack?"ok":"warn"))}>
            <span>{onTrack?"ON TRACK":""}</span>
            <b>J{period.day}/{period.total}</b>
            <small>{period.remaining} jour(s) restants</small>
          </div>
        </div>

        <div className="flight-main-grid">
          <div className="flight-money-panel">
            <span>Commission</span>
            <b>{fmt(syn.grand)}</b>
            <small>Projection fin de mois : {fmt(projCom)}</small>
            <small style={{display:"block",marginTop:7,color:"#bae6fd",fontWeight:950}}>Moyenne totale / vente : {syn.vn?fmt(moyenneTotaleVente):"—"}</small>
            <small style={{display:"block",marginTop:5,color:objectifEuros>0?"#c4b5fd":"#94a3b8",fontWeight:900}}>
              {objectifEuros>0?("Objectif financier : "+fmt(objectifEuros)+" · reste "+fmt(objectifRestantAccueil)):"Objectif financier à fixer dans Plus"}
            </small>
            <div className="flight-runway"><i style={{width:period.pct+"%"}}></i></div>
          </div>

          <div className="flight-instruments">
            <Gauge label="Ventes" value={syn.vn} target={objV} sub={resteV?resteV+" restantes":"objectif atteint"} tone="blue"/>
            <Gauge label="VD" value={syn.vd} target={objVD} sub={resteVD?resteVD+" restantes":"objectif atteint"} tone="cyan"/>
            <GaugePercent label="Installées" value={tauxInstallAccueil} target={100} sub={totalVentesAccueil?(ventesInstalleesAccueil+" inst / "+totalVentesAccueil+" ventes"):"Aucune vente saisie"} tone={tauxInstallAccueil>=90?"cyan":tauxInstallAccueil>=70?"blue":"violet"} empty={!totalVentesAccueil}/>
            <GaugePercent label="Taux transfo VF" value={tauxVFAccueil} target={objTauxVF} sub={rdvVFCount?(vfCount+" / "+rdvVFCount+" RDV VF"):"RDV VF à saisir"} tone={tauxVFAccueil>=objTauxVF?"cyan":"violet"} empty={!rdvVFCount}/>
          </div>
        </div>
      </section>

      <section className="flight-chart-card">
        <div className="flight-card-head">
          <div>
            <span>Trajectoire ventes</span>
            <h2>Courbe de pilotage du mois commercial</h2>
          </div>
          <div className="flight-chart-legend">
            <span><i className="real"></i> Réel</span>
            <span><i className="target"></i> Objectif</span>
            <span><i className="proj"></i> Projection</span>
            <span><i className="bars"></i> Barres du jour</span>
          </div>

async function preparePVImage(file){
  const url=URL.createObjectURL(file);

    const img=await new Promise((res,rej)=>{const i=new Image();i.onload=()=>res(i);i.onerror=rej;i.src=url;});
    const maxW=2200,scale=Math.min(2.2,maxW/img.width),w=Math.max(img.width,Math.round(img.width*scale)),h=Math.round(img.height*(w/img.width));
    const c=document.createElement("canvas");c.width=w;c.height=h;
    const x=c.getContext("2d",{willReadFrequently:true});x.drawImage(img,0,0,w,h);
    const im=x.getImageData(0,0,w,h),d=im.data;
    // Niveaux de gris + contraste modéré pour les screenshots de documents.
    for(let i=0;i<d.length;i+=4){let g=.299*d[i]+.587*d[i+1]+.114*d[i+2];g=Math.max(0,Math.min(255,(g-128)*1.28+145));d[i]=d[i+1]=d[i+2]=g;}
    x.putImageData(im,0,0);
    return c;
  }finally{URL.revokeObjectURL(url);}
}
async function checkPVImage(file){
  const url=URL.createObjectURL(file);
  try{
    const img=await new Promise((res,rej)=>{const i=new Image();i.onload=()=>res(i);i.onerror=rej;i.src=url;});
    if(img.width<900||img.height<900) return {ok:false,reason:`Capture trop petite (${img.width}×${img.height}). Refais la capture en affichant la page entière.`};
    const c=document.createElement("canvas"),w=240,h=Math.max(160,Math.round(240*img.height/img.width));c.width=w;c.height=h;
    const x=c.getContext("2d",{willReadFrequently:true});x.drawImage(img,0,0,w,h);const d=x.getImageData(0,0,w,h).data;
    let sum=0,sum2=0,n=0,edge=0;
    for(let y=1;y<h-1;y++)for(let xx=1;xx<w-1;xx++){const i=(y*w+xx)*4,g=.299*d[i]+.587*d[i+1]+.114*d[i+2];sum+=g;sum2+=g*g;n++;const j=(y*w+xx+1)*4;edge+=Math.abs(g-(.299*d[j]+.587*d[j+1]+.114*d[j+2]));}
    const mean=sum/n,variance=sum2/n-mean*mean,edgeAvg=edge/n;
    if(mean<45) return {ok:false,reason:"Capture trop sombre ou écran mal lisible. Augmente la luminosité puis refais la capture."};
    if(mean>245) return {ok:false,reason:"Capture surexposée ou page illisible. Refais la capture avec le document bien visible."};
    if(variance<700||edgeAvg<5.2) return {ok:false,reason:"Capture trop floue ou fortement compressée. Refais une capture nette depuis Salesforce."};
    return {ok:true,meta:{width:img.width,height:img.height,brightness:Math.round(mean),sharpness:Math.round(edgeAvg*10)/10}};
  } finally {URL.revokeObjectURL(url);}
}
async function readPVFiles(files,onProgress){
  let all="",quality=[],usable=0;
  const textBlocks=[];
  for(let idx=0;idx<files.length;idx++){
    const file=files[idx];onProgress&&onProgress(`Analyse ${idx+1}/${files.length} : ${file.name}`);
    try{
      if(file.type==="application/pdf"||/\.pdf$/i.test(file.name)){
        const buf=await file.arrayBuffer(),pdf=await pdfjsLib.getDocument({data:buf}).promise;
        if(pdf.numPages<1) throw new Error("PDF vide");
        let pdfText="";
        for(let p=1;p<=pdf.numPages;p++){
          const page=await pdf.getPage(p),content=await page.getTextContent();
          pdfText+="\n"+content.items.map(i=>i.str).join(" ");
        }
        if(pvNorm(pdfText).length<80) throw new Error("texte insuffisant");
        textBlocks.push({name:file.name,text:pdfText});usable++;
        quality.push({name:file.name,ok:true,kind:"PDF",pages:pdf.numPages});
      }else if(file.type.startsWith("image/")){
        const q=await checkPVImage(file);
        if(!q.ok){quality.push({name:file.name,...q,kind:"CAPTURE"});continue;}
        const T=await loadTesseract();
        const prepared=await preparePVImage(file);
        const result=await T.recognize(prepared,"fra",{
          tessedit_pageseg_mode:6,
          preserve_interword_spaces:1,
          logger:m=>{if(m.status==="recognizing text")onProgress&&onProgress(`Lecture ${idx+1}/${files.length} : ${Math.round((m.progress||0)*100)}%`);}
        });
        const tx=result?.data?.text||"";
        if(pvNorm(tx).length<35){quality.push({name:file.name,ok:false,reason:"Texte insuffisant ou capture trop coupée.",kind:"CAPTURE",...q.meta});continue;}
        textBlocks.push({name:file.name,text:tx});usable++;
        quality.push({name:file.name,ok:true,kind:"CAPTURE",...q.meta});
      }else quality.push({name:file.name,ok:false,kind:"FICHIER",reason:"Format non accepté"});
    }catch(err){quality.push({name:file.name,ok:false,kind:file.type?.startsWith("image/")?"CAPTURE":"FICHIER",reason:err?.message||"Lecture impossible"});}
  }
  if(!usable) throw new Error("Aucune capture exploitable. Ajoute des captures nettes et complètes du PV.");
  // L’ordre des captures n’a aucune importance : les textes sont fusionnés puis analysés globalement.
  all=textBlocks.map(x=>`\n--- ${x.name} ---\n${x.text}`).join("\n");
  const clientIds=[...new Set((all.match(/\b2\d{6}\b/g)||[]))];
  if(clientIds.length>1) throw new Error(`Plusieurs numéros clients détectés (${clientIds.join(", ")}). Vérifie que toutes les captures appartiennent au même PV.`);
  const parsed=parsePVText(all);
  parsed.quality=quality;parsed.fileNames=files.map(f=>f.name);parsed.usableFiles=usable;parsed.rejectedFiles=quality.filter(q=>!q.ok).length;
  if(parsed.rejectedFiles) parsed.warnings.push(`${parsed.rejectedFiles} capture(s) ignorée(s), les autres ont été analysées.`);
  return parsed;
}

  );

  return(
    <div style={{display:"flex",flexDirection:"column",gap:12}}>

      </div>

        <div style={{display:"flex",flexDirection:"column",gap:6,maxHeight:170,overflowY:"auto"}}>{pvFiles.map(f=><div key={fileKey(f)} style={{display:"flex",alignItems:"center",justifyContent:"space-between",gap:8,padding:"8px 10px",borderRadius:12,background:"rgba(2,6,23,.42)",color:"#cbd5e1",fontSize:11,fontWeight:800}}><span style={{overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{f.name}</span><button onClick={()=>removePVFile(fileKey(f))} disabled={pvBusy} style={{border:"none",background:"transparent",color:"#fda4af",fontWeight:1000}}>✕</button></div>)}</div>
        <button onClick={analyzePVFiles} disabled={pvBusy} style={{width:"100%",marginTop:11,padding:12,borderRadius:14,border:"none",background:"linear-gradient(135deg,#10b981,#0f766e)",color:"#fff",fontWeight:1000,opacity:pvBusy?0.7:1}}>{pvBusy?"Analyse en cours…":`Analyser les ${pvFiles.length} capture(s)`}</button>
      </div>}
      {(pvBusy||pvProgress)&&<div style={{padding:14,borderRadius:18,background:"rgba(56,189,248,.10)",border:"1px solid rgba(56,189,248,.30)",color:"#bae6fd",fontWeight:900,fontSize:13}}>⏳ {pvProgress||"Analyse en cours…"}</div>}
      {pvError&&<div style={{padding:14,borderRadius:18,background:"rgba(239,68,68,.12)",border:"1px solid rgba(248,113,113,.38)",color:"#fecaca",fontWeight:850,fontSize:13,lineHeight:1.45}}>Document refusé : {pvError}<div style={{marginTop:7,color:"#fda4af",fontSize:11}}>Aucune vente n’a été créée ni modifiée.</div></div>}

          <div style={{marginTop:4,color:"#cbd5e1",fontSize:12,fontWeight:750}}>N° client {pvResult.numClient||"—"} · le PV est prioritaire uniquement pour les champs cochés ci-dessous.</div>

        {(pvResult.quality||[]).map((q,i)=><div key={i} style={{fontSize:11,color:q.ok?"#86efac":"#fecaca",marginBottom:5,fontWeight:800}}>{q.ok?"✓":"✕"} {q.name} · {q.kind}{q.pages?` · ${q.pages} page(s)`:""}</div>)}

      {!editingId&&showForm&&<button onClick={()=>{if(showForm){setShowForm(false);setEditingId(null);setEditPackId(null);setForm(newVente());}else{setForm(newVente());setEditingId(null);setEditPackId(null);setShowForm(true);}}} style={{background:"linear-gradient(135deg,#38bdf8,#6366f1)",color:"#fff",border:"1px solid rgba(255,255,255,.18)",borderRadius:18,padding:"14px",fontWeight:900,fontSize:15,cursor:"pointer",boxShadow:"0 16px 32px rgba(56,189,248,.18)",width:"100%"}}>

      <Card title={"Ventes - Nettes: "+ventes.filter(function(v){return !v.annulation;}).length+" / Total: "+ventes.length}>

        {(challenges||[]).map(c=>{
          const qte=(+c.qte||1);
          const rawMontant=(c.montant===0||c.montant==="0")?"":(c.montant??"");
          const total=(+c.montant||0)*qte;
          return(
            <div key={c.id} className="tbr-challenge-row">
              <div>
                <input className="tbr-challenge-name" value={c.nom||""} onChange={e=>updChall(c.id,"nom",e.target.value)} placeholder="Nom du challenge"/>

                  <div>
                    <label>Prime</label>
                    <div className="tbr-challenge-money">
                      <input type="text" inputMode="numeric" pattern="[0-9]*" value={rawMontant} onChange={e=>{const v=e.target.value.replace(/[^0-9]/g,"");updChall(c.id,"montant",v===""?"":+v);}} placeholder="Ex : 50"/>
                      <i>€</i>
                    </div>
                  </div>
                  <div>
                    <label>Qté</label>
                    <input type="text" inputMode="numeric" pattern="[0-9]*" value={c.qte??1} onChange={e=>{const v=e.target.value.replace(/[^0-9]/g,"");updChall(c.id,"qte",v===""?"":Math.max(1,+v));}} placeholder="1"/>
                  </div>
                  <div className="tbr-challenge-line-total">
                    <small>Total ligne</small>
                    <b>{fmt(total)}</b>
                  </div>
                </div>
              </div>
              <button onClick={()=>delChall(c.id)} className="tbr-challenge-remove">Retirer</button>
            </div>
          );
        })}

        <button onClick={addChall} className="tbr-challenge-add">+ Ajouter un challenge</button>
      </section>
    </div>
  );
}



function TendanceView({syn,mois,setMois,moisActif,agent,rdvVFMois,objectifPersoMois,objectifEurosMois,objectifVentesMois,objectifVDMois,challengesTotal=0}){
  const status=(agent&&agent.statut)||"PLATINIUM";
  const [debut,setDebut]=useState(mois&&mois.debut?mois.debut:"");
  const [fin,setFin]=useState(mois&&mois.fin?mois.fin:"");
  const [typeMois,setTypeMois]=useState((mois&&mois.type)||"4 semaines");
  const [mode,setMode]=useState("ventes");
  const [selected,setSelected]=useState(null);

  const objectifV=objectifVentesMois||20;
  const objectifVD=objectifVDMois||12;
  const objectifCom=(+objectifEurosMois||0)>0?(+objectifEurosMois):Math.max(5000,Math.ceil((syn.grand||0)/500)*500);

  function parseLocalDate(v){
    if(!v) return null;
    const d=new Date(String(v).slice(0,10)+"T00:00:00");
    return isNaN(d.getTime())?null:d;
  }
  function iso(d){return d.toISOString().slice(0,10);}
  function clamp(n,min,max){return Math.max(min,Math.min(max,n));}
  function save(d,f,t){
    setDebut(d);setFin(f);setTypeMois(t);
    setMois({debut:d,fin:f,type:t});
  }
  function autoPeriod(kind){
    const start=new Date(moisActif.annee,moisActif.mois-1,1);
    const end=new Date(start);
    end.setDate(start.getDate()+(kind==="5 semaines"?34:27));
    save(iso(start),iso(end),kind);
  }
  function dayLabel(d){
    return d.toLocaleDateString("fr-FR",{weekday:"short",day:"2-digit",month:"short"}).replace(".", "");
  }
  function shortDay(d){
    return d.toLocaleDateString("fr-FR",{weekday:"short",day:"2-digit"}).replace(".", "");
  }
  function formatVal(v){
    if(mode==="commission") return fmt(Math.round(v||0));
    return Math.round(v||0);
  }
  function isSunday(d){return d.getDay()===0;}
  function localKey(d){
    const y=d.getFullYear();
    const m=String(d.getMonth()+1).padStart(2,"0");
    const j=String(d.getDate()).padStart(2,"0");
    return y+"-"+m+"-"+j;
  }
  function buildWorkingDays(a,b){
    const arr=[];
    const cur=new Date(a);
    while(cur<=b){
      if(!isSunday(cur)) arr.push(new Date(cur));
      cur.setDate(cur.getDate()+1);
    }
    return arr.length?arr:[new Date(a)];
  }

  let start=parseLocalDate(debut)||new Date(moisActif.annee,moisActif.mois-1,1);
  let end=parseLocalDate(fin)||new Date(moisActif.annee,moisActif.mois,0);
  if(end<start){start=new Date(moisActif.annee,moisActif.mois-1,1);end=new Date(moisActif.annee,moisActif.mois,0);}

  const today=new Date();
  const today0=new Date(today.getFullYear(),today.getMonth(),today.getDate());
  const workingDates=buildWorkingDays(start,end);
  const totalDays=Math.max(1,workingDates.length);
  const passedWorking=today0<start?1:(today0>end?totalDays:workingDates.filter(d=>d<=today0).length);
  const dayIndex=clamp(passedWorking||1,1,totalDays);
  const remaining=today0>=end?0:workingDates.filter(d=>d>today0).length;

  const details=(syn.details||[]).filter(v=>!v.annulation);
  const days=workingDates.map(d=>({
      date:d,
      label:dayLabel(d),
      short:shortDay(d),
      sales:0,
      vd:0,
      com:0,
      clients:[]
    }));
  const dayKeyToIndex=new Map(days.map((d,i)=>[localKey(d.date),i]));
  function workIndexForSaleDate(d){
    if(d<start||d>end) return null;
    const direct=dayKeyToIndex.get(localKey(d));
    if(direct!==undefined) return direct;
    const next=days.findIndex(x=>x.date>d);
    if(next>=0) return next;
    for(let i=days.length-1;i>=0;i--){if(days[i].date<d) return i;}
    return null;
  }

  details.forEach(v=>{
    const d=parseLocalDate(v.dateVente); 
    if(!d) return;
    const idx=workIndexForSaleDate(d);
    if(idx!==null){
      days[idx].sales+=1;
      if(v.typeVente==="VD") days[idx].vd+=1;
      days[idx].com+=v.result?(v.result.total||0):0;
      days[idx].clients.push(v.numClient?String(v.numClient):(v.nomClient||"Client"));
    }
  });

  let cSales=0,cVD=0,cCom=0;
  days.forEach((d,i)=>{
    cSales+=d.sales;
    cVD+=d.vd;
    cCom+=d.com;
    d.cumSales=cSales;
    d.cumVD=cVD;
    d.cumCom=Math.round((cCom+getPalierVentes(cSales)+getPalierVD(cVD)+getBonusSGP(status,cSales,cVD))*100)/100;
    if(i===days.length-1) d.cumCom=Math.max(d.cumCom,syn.grand||0);
  });

  const elapsed=Math.max(1,dayIndex);
  const projV=syn.vn?Math.round((syn.vn/elapsed)*totalDays):0;
  const projVD=syn.vd?Math.round((syn.vd/elapsed)*totalDays):0;
  const projCom=syn.grand?Math.round((syn.grand/elapsed)*totalDays):0;

  let mainKey="cumSales", dailyKey="sales", objectif=objectifV, projection=projV, label="Ventes cumulées", unit="";
  if(mode==="vd"){mainKey="cumVD";dailyKey="vd";objectif=objectifVD;projection=projVD;label="VD cumulées";}
  if(mode==="commission"){mainKey="cumCom";dailyKey="com";objectif=objectifCom;projection=projCom;label="Commission cumulée";unit="€";}

  const W=Math.max(1040,totalDays*62);
  const H=430;
  const L=78;
  const R=36;
  const T=32;
  const B=88;
  const chartW=W-L-R;
  const chartH=H-T-B;
  const xFor=i=>L+(totalDays<=1?0:(i/(totalDays-1))*chartW);
  const maxDaily=Math.max(1,...days.map(d=>Number(d[dailyKey])||0));
  const maxY=Math.max(1,objectif||0,projection||0,...days.map(d=>Number(d[mainKey])||0));
  const yFor=v=>T+chartH-(Math.max(0,Number(v)||0)/maxY)*chartH;
  const actualPts=days.map((d,i)=>xFor(i).toFixed(1)+","+yFor(d[mainKey]).toFixed(1)).join(" ");
  const todayI=clamp(dayIndex-1,0,totalDays-1);
  const todayX=xFor(todayI);
  const actualToday=days[todayI]?Number(days[todayI][mainKey]||0):0;
  const projPts=todayX.toFixed(1)+","+yFor(actualToday).toFixed(1)+" "+(L+chartW).toFixed(1)+","+yFor(projection).toFixed(1);
  const targetPts=days.map((d,i)=>{
    const target=(objectif||0)*((i+1)/totalDays);
    return xFor(i).toFixed(1)+","+yFor(target).toFixed(1);
  }).join(" ");
  const yTicks=[0,.25,.5,.75,1].map(p=>Math.round(maxY*p));
  const selectedDay=selected!==null&&days[selected]?days[selected]:days[todayI];
  const weekChunks=[];
  for(let i=0;i<days.length;i+=7){
    const chunk=days.slice(i,i+7);
    weekChunks.push({
      idx:Math.floor(i/7)+1,
      sales:chunk.reduce((s,d)=>s+d.sales,0),
      vd:chunk.reduce((s,d)=>s+d.vd,0),
      com:chunk.reduce((s,d)=>s+d.com,0)
    });
  }
  const bestDay=days.reduce((best,d,i)=>(d.sales>best.sales?{...d,idx:i}:best),{sales:0,vd:0,com:0,idx:0,label:"—"});
  const needPerDay=Math.max(0,(objectifV-syn.vn)/Math.max(1,remaining));
  const rate=syn.vn/elapsed;
  const perfVsTarget=(syn.vn-((objectifV*dayIndex)/totalDays));
  const rythmeLabel=syn.vn===0?"À lancer":(rate>=needPerDay?"Dans le rythme":"À pousser");
  const rythmeDetail=syn.vn===0?"Aucune vente saisie sur la période":(rate>=needPerDay?"Rythme actuel suffisant":"Rythme actuel inférieur au besoin");
  const hasObjectifCom=(+objectifEurosMois||0)>0;
  const ecartProjCom=hasObjectifCom?(projCom-(+objectifEurosMois||0)):0;
  const projectionComSub=hasObjectifCom?(ecartProjCom>=0?("+"+fmt(ecartProjCom)+" vs objectif financier"):(fmt(Math.abs(ecartProjCom))+" manquant vs objectif financier")):"Objectif financier non défini";

  return(
    <div className="terminal-page">
      <section className="terminal-header">
        <div>
          <div className="terminal-eyebrow">Terminal commercial</div>
          <h2>Mois commercial piloté au jour exact</h2>
          <p>{start.toLocaleDateString("fr-FR",{weekday:"long",day:"2-digit",month:"long"})} → {end.toLocaleDateString("fr-FR",{weekday:"long",day:"2-digit",month:"long",year:"numeric"})} · hors dimanches</p>
        </div>
        <div className="terminal-day">
          <span>Aujourd’hui</span>
          <b>J{dayIndex}/{totalDays}</b>
          <small>{remaining} jour(s) travaillé(s) restant(s)</small>
        </div>
      </section>

      <section className="terminal-card terminal-period">
        <div className="terminal-card-head">
          <div>
            <div className="terminal-title">Période commerciale</div>
            <div className="terminal-sub">Calibrage utilisé par le graphique · dimanches exclus</div>
          </div>
          <div className="terminal-actions">
            <button onClick={()=>autoPeriod("4 semaines")} className={typeMois==="4 semaines"?"active":""}>4 semaines</button>
            <button onClick={()=>autoPeriod("5 semaines")} className={typeMois==="5 semaines"?"active":""}>5 semaines</button>
          </div>
        </div>
        <div className="terminal-date-grid">
          <label><span>Début</span><input type="date" value={debut} onChange={e=>save(e.target.value,fin,typeMois)}/></label>
          <label><span>Fin</span><input type="date" value={fin} onChange={e=>save(debut,e.target.value,typeMois)}/></label>
        </div>
      </section>

      <section className="terminal-card terminal-kpis">
        <div className="terminal-kpi-head"><i>⚡</i><span>Lecture rapide</span></div>
        <div className="terminal-kpi-card">
          <span>Réel aujourd’hui</span>
          <b>{syn.vn} vente(s)</b>
          <small>{syn.vd} VD · commission actuelle {fmt(syn.grand)} · rythme {rate.toFixed(2)}/j travaillé</small>
        </div>
        <div className="terminal-kpi-card">
          <span>Projection ventes</span>
          <b>{projV} vente(s)</b>
          <small>{projVD} VD projeté(s) au rythme actuel</small>
        </div>
        <div className="terminal-kpi-card money">
          <em className="terminal-kpi-icon">€</em>
          <span>Projection commission</span>
          <b>{fmt(projCom)}</b>
          <small>{projectionComSub}</small>
        </div>
        <div className="terminal-kpi-card">
          <span>Objectif / reste</span>
          <b>{Math.max(0,objectifV-syn.vn)} à faire</b>
          <small>{Math.max(0,objectifVD-syn.vd)} VD à faire · besoin {needPerDay.toFixed(2)} vente/j travaillé</small>
        </div>
        <div className={"terminal-kpi-card status "+(rate>=needPerDay&&syn.vn>0?"ok":"warn")}>
          <span>Statut rythme</span>
          <b>{rythmeLabel}</b>
          <small>{rythmeDetail}</small>
        </div>
      </section>

      <section className="terminal-card terminal-master">
        <div className="terminal-card-head">
          <div>
            <div className="terminal-title">{label}</div>
            <div className="terminal-sub">Réel · objectif progressif · projection · barres du jour · hors dimanches</div>
          </div>
          <div className="terminal-mode">
            <button onClick={()=>setMode("ventes")} className={mode==="ventes"?"active":""}>Ventes</button>
            <button onClick={()=>setMode("vd")} className={mode==="vd"?"active":""}>VD</button>
            <button onClick={()=>setMode("commission")} className={mode==="commission"?"active":""}>Commission</button>

        <div className="terminal-legend">
          <span><i className="real"></i> Réel</span>
          <span><i className="target"></i> Objectif</span>
          <span><i className="proj"></i> Projection</span>
          <span><i className="bar"></i> Barres du jour</span>
        </div>

        <div className="terminal-scroll">
          <svg className="terminal-svg" viewBox={"0 0 "+W+" "+H} style={{width:W,height:H}}>
            <defs>
              <linearGradient id="terminalFill" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%" stopColor="rgba(56,189,248,.28)"/>
                <stop offset="100%" stopColor="rgba(56,189,248,0)"/>
              </linearGradient>
              <filter id="terminalGlow" x="-20%" y="-20%" width="140%" height="140%">
                <feGaussianBlur stdDeviation="3" result="blur"/>
                <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
              </filter>
            </defs>

            <rect x="0" y="0" width={W} height={H} rx="22" className="terminal-bg"/>
            <line x1={L} y1={T} x2={L} y2={T+chartH} className="terminal-axis"/>

            {yTicks.map((tick,idx)=>(

                <line x1={L} x2={L+chartW} y1={yFor(tick)} y2={yFor(tick)} className="terminal-grid-line"/>

              </g>
            ))}

            {days.map((d,i)=>(
              <g key={"d"+i} onClick={()=>setSelected(i)} className="terminal-day-zone">
                <line x1={xFor(i)} x2={xFor(i)} y1={T} y2={T+chartH} className={i===todayI?"terminal-today-grid":"terminal-day-grid"}/>
                <rect x={xFor(i)-8} y={T+chartH-(Math.max(0,Number(d[dailyKey])||0)/maxDaily)*64} width="16" height={(Math.max(0,Number(d[dailyKey])||0)/maxDaily)*64} rx="5" className={d[dailyKey]>0?"terminal-bar active":"terminal-bar"}/>
                <text x={xFor(i)} y={T+chartH+27} textAnchor="middle" className="terminal-x-day">{d.date.toLocaleDateString("fr-FR",{weekday:"short"}).replace(".","")}</text>
                <text x={xFor(i)} y={T+chartH+45} textAnchor="middle" className="terminal-x-date">{d.date.toLocaleDateString("fr-FR",{day:"2-digit",month:"short"}).replace(".","")}</text>
                {d.sales>0&&<circle cx={xFor(i)} cy={T+chartH+61} r="3.5" className="terminal-sale-dot"/>}
                <title>{d.label+" · "+d.sales+" vente(s) · "+d.vd+" VD · "+fmt(d.com)}</title>

            ))}

            <polyline points={targetPts} fill="none" className="terminal-target"/>
            <polygon points={L+","+(T+chartH)+" "+actualPts+" "+(L+chartW)+","+(T+chartH)} className="terminal-area"/>
            <polyline points={actualPts} fill="none" className="terminal-line" filter="url(#terminalGlow)"/>
            <polyline points={projPts} fill="none" className="terminal-projection"/>

            <line x1={todayX} x2={todayX} y1={T} y2={T+chartH} className="terminal-today"/>

            <text x={todayX+10} y={T+18} className="terminal-today-label">Aujourd’hui</text>
          </svg>
        </div>

        <div className="terminal-selected">
          <div>
            <span>Date sélectionnée</span>
            <b>{selectedDay?selectedDay.label:"—"}</b>
          </div>
          <div><span>Ventes jour</span><b>{selectedDay?selectedDay.sales:0}</b></div>
          <div><span>VD jour</span><b>{selectedDay?selectedDay.vd:0}</b></div>
          <div><span>Commission jour</span><b>{selectedDay?fmt(selectedDay.com):fmt(0)}</b></div>
          <div><span>N° clients</span><b>{selectedDay&&selectedDay.clients.length?selectedDay.clients.join(", "):"—"}</b></div>
        </div>
      </section>

      <section className="terminal-card terminal-weeks">
        <div className="terminal-card-head">
          <div>
            <div className="terminal-title">Lecture par semaine</div>
            <div className="terminal-sub">Résumé automatique de ton mois commercial</div>
          </div>
          <div className={perfVsTarget>=0?"terminal-pill ok":"terminal-pill warn"}>{perfVsTarget>=0?"+":""}{perfVsTarget.toFixed(1)} vente vs rythme</div>
        </div>
        <div className="terminal-week-grid">
          {weekChunks.map(w=>(
            <div className="terminal-week" key={w.idx}>
              <span>S{w.idx}</span>
              <b>{w.sales} vente(s)</b>
              <small>{w.vd} VD · {fmt(w.com)}</small>
            </div>
          ))}
        </div>
        <div className="terminal-insights">
          <div><b>Meilleur jour</b><span>{bestDay.sales?bestDay.label+" · "+bestDay.sales+" vente(s)":"Aucune vente sur la période"}</span></div>
          <div><b>Action</b><span>{projV>=objectifV?"Tu es sur un bon rythme : sécurise les installations et les VD.":"Priorité : "+Math.max(0,objectifV-syn.vn)+" vente(s) à aller chercher, soit "+needPerDay.toFixed(2)+" vente/j travaillé."}</span></div>
        </div>
      </section>
    </div>
  );
}
