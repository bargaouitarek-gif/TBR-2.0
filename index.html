function DCOCheckView({agent,moisActif,aimt,onEditClient}){
  const DCO_CACHE_KEY="tbr_dco_cache_v2";
  const savedDco=LD(DCO_CACHE_KEY,null);
  const [loading,setLoading]=useState(false);
  const [dcoData,setDcoData]=useState(()=>savedDco&&savedDco.data?savedDco.data:null);
  const [dcoRaw,setDcoRaw]=useState(()=>savedDco&&savedDco.raw?savedDco.raw:null);
  const [erreur,setErreur]=useState(null);
  const [nomFichier,setNomFichier]=useState(()=>savedDco&&savedDco.name?savedDco.name:null);
  const [dateImport,setDateImport]=useState(()=>savedDco&&savedDco.date?savedDco.date:null);
  const [moisDCO,setMoisDCO]=useState(()=>savedDco&&savedDco.month?savedDco.month:(moisActif||{annee:new Date().getFullYear(),mois:new Date().getMonth()+1}));
  const fileRef=useRef();
  const ip=getIP(agent.ventesPrec||0);

  const pad=n=>String(n).padStart(2,"0");
  const money=n=>fmt(Number(n||0));
  const signedMoney=n=>{const v=Number(n||0);return (v>0?"+":"")+money(v);};
  const signClass=n=>Number(n||0)<-0.99?"neg":Number(n||0)>0.99?"pos":"";
  const normNum=v=>String(v||"").replace(/\D/g,"");
  const toNum=v=>{
    if(v===undefined||v===null) return 0;
    const cleaned=String(v).replace(/[€\s]/g,"").replace(",",".");
    const n=parseFloat(cleaned);
    return isNaN(n)?0:n;
  };
  const round2=n=>Math.round((Number(n)||0)*100)/100;
  const monthKey=m=>`cc_ventes_${m.annee}_${pad(m.mois)}`;
  const loadAllSales=m=>LD(monthKey(m),[]);

  const ventesAll=useMemo(()=>loadAllSales(moisDCO),[moisDCO]);
  const ventesActives=ventesAll.filter(v=>!v.annulation);

  async function readPageLines(pdf,pageNo){
    const page=await pdf.getPage(pageNo);
    const tc=await page.getTextContent();
    const buckets={};
    tc.items.forEach(function(it){
      const s=String(it.str||"").trim();
      if(!s) return;
      const tr=it.transform||[0,0,0,0,0,0];
      const y=Math.round((tr[5]||0)/3)*3;
      const x=tr[4]||0;
      if(!buckets[y]) buckets[y]=[];
      buckets[y].push({x:x,str:s});
    });
    return Object.keys(buckets).map(Number).sort(function(a,b){return b-a;}).map(function(y){
      return buckets[y].sort(function(a,b){return a.x-b.x;}).map(function(i){return i.str;}).join(" ").replace(/\s+/g," ").trim();
    }).filter(Boolean);
  }

  function getFirst(text,regex){
    const m=text.match(regex);
    return m?toNum(m[1]):0;
  }

  function parseSummary(p1){
    const text=p1.replace(/\s+/g," ");
    const ventesMatches=[];
    let m;
    const rx=/Commission sur ventes\s*\(\d\)\s*(-?[\d\s,.]+)/gi;
    while((m=rx.exec(text))!==null) ventesMatches.push(toNum(m[1]));
    const monthMatch=text.match(/MOIS COMMERCIAL\s+(\d{4})-(\d{1,2})/i);
    return {
      moisDoc:monthMatch?{annee:Number(monthMatch[1]),mois:Number(monthMatch[2])}:null,
      vBrutes:getFirst(text,/Nombre de ventes brutes\s+(-?[\d\s,.]+)/i),
      annuls:getFirst(text,/Nombre d.?annulations\s+(-?[\d\s,.]+)/i),
      vNettes:getFirst(text,/Nombre de ventes nettes\s+(-?[\d\s,.]+)/i),
      comVentes:ventesMatches.length?ventesMatches[0]:0,
      comVentesTotal:ventesMatches.length?ventesMatches[ventesMatches.length-1]:0,
      comPacks:getFirst(text,/Commission sur packs\s*\(\d\)\s*(-?[\d\s,.]+)/i),
      comInstall:getFirst(text,/Commission sur installations\s+(-?[\d\s,.]+)/i),
      vDirectes:getFirst(text,/Nombre de ventes directes\s+(-?[\d\s,.]+)/i),
      palierVD:getFirst(text,/Prime palier sur ventes directes\s+(-?[\d\s,.]+)/i),
      palierV:getFirst(text,/Prime palier sur ventes totales\s+(-?[\d\s,.]+)/i),
      bonusSGP:getFirst(text,/Bonus\s+(?:SILVER|GOLD|PLATINIUM)[^0-9-]*(-?[\d\s,.]+)/i),
      totalDCO:getFirst(text,/TOTAL COMMISSIONS ET PRIMES\s+(-?[\d\s,.]+)/i)
    };
  }

  function parseClientRows(p2){
    const rows=[];
    const text=(Array.isArray(p2)?p2.join(" "):String(p2||"")).replace(/\s+/g," ").trim();
    const starts=[];
    const startRx=/(?:^|\s)(-?1|0)\s+(\d{6,8})(?=\s)/g;
    let sm;
    while((sm=startRx.exec(text))!==null) starts.push({index:sm.index+(sm[0].startsWith(" ")?1:0),nb:Number(sm[1]),num:normNum(sm[2])});
    const cats="REFVD|REFVF|PURVD|PURVF|PREVD|PREVF|RMK|PURGU";
    const seen={};
    starts.forEach((st,i)=>{
      const end=i+1<starts.length?starts[i+1].index:text.length;
      const chunk=text.slice(st.index,end).replace(/^(-?1|0)\s+\d{6,8}\s+/,"").trim();
      const catMatch=chunk.match(new RegExp("\\b("+cats+")\\b","i"));
      if(!catMatch||!st.num||seen[st.num]) return;
      const catpub=catMatch[1].toUpperCase();
      const nom=chunk.slice(0,catMatch.index).replace(/TOTAL|ANNEXE.*$/gi,"").trim()||"Client";
      let tail=chunk.slice((catMatch.index||0)+catMatch[0].length).trim();
      let engagement=0;
      const eng=tail.match(/^(\d{1,2})\s*mois\b/i);
      if(eng){engagement=Number(eng[1]);tail=tail.slice(eng[0].length).trim();}
      const offerMatch=tail.match(/\b(ACQ\s*(?:start|location)|annulation_[A-Z0-9_]+)\b/i);
      const offre=offerMatch?offerMatch[1].replace(/\s+/g," "):"";
      const numericPart=offerMatch?tail.slice(0,offerMatch.index):tail;
      const nums=(numericPart.match(/-?\d+(?:[,.]\d+)?/g)||[]).map(toNum);
      if(nums.length<3) return;
      const last=nums.slice(-3);
      seen[st.num]=true;
      rows.push({nb:st.nb,num:st.num,nom,catpub,engagement,caPacks:last[0],comVente:last[1],comPacks:last[2],offre,isAnnulation:st.nb<=0||/annulation/i.test(offre)});
    });
    return rows;
  }

  function parseInstallRows(p3){
    const installs={};
    const text=String(p3||"").replace(/\s+/g," ");
    const chunks=text.split(/(?=\b\d{6,8}\b)/g);
    chunks.forEach(function(chunk){
      const id=(chunk.match(/\b(\d{6,8})\b/)||[])[1];
      if(!id) return;
      const beforeOffer=chunk.split(/ACQ\s*start|annulation_AIMT/i)[0]||"";
      const nums=beforeOffer.match(/-?\d+(?:[,.]\d+)?/g)||[];
      if(nums.length>=2){
        installs[normNum(id)]=toNum(nums[nums.length-1]);
      }
    });
    return installs;
  }

  function buildAnalysis(summary,rows,installs,moisUsed){
    const all=loadAllSales(moisUsed);
    const active=all.filter(v=>!v.annulation);
    const cancelled=all.filter(v=>v.annulation);
    const aimtItems=Array.isArray(aimt&&aimt.items)?aimt.items:[];
    const aimtVD=aimtItems.length?aimtItems.filter(x=>x.typeVente==="VD").length:(Number(aimt&&aimt.vd)||0);
    const aimtVF=aimtItems.length?aimtItems.filter(x=>x.typeVente==="VF").length:(Number(aimt&&aimt.vf)||0);
    const aimtTotal=aimtVD+aimtVF;
    const tbrBrutes=active.length+cancelled.length;
    const tbrNettes=cancelled.length?active.length:Math.max(0,active.length-aimtTotal);
    const tbrAnnuls=cancelled.length?-cancelled.length:(aimtTotal?-aimtTotal:0);
    const tbrVDBase=active.filter(v=>v.typeVente==="VD").length;
    const tbrVD=cancelled.length?tbrVDBase:Math.max(0,tbrVDBase-aimtVD);

    const byNum={};
    active.forEach(v=>{const n=normNum(v.numClient); if(n) byNum[n]=v;});
    const annByNum={};
    cancelled.forEach(v=>{
      const n=normNum(v.numClientAnn||v.numClient);
      if(n) annByNum[n]=v;
    });
    aimtItems.forEach(x=>{
      const n=normNum(x.numClient);
      if(n) annByNum[n]={...x,annulation:true,numClientAnn:n,nomClient:x.nomClient||"Annulation ancien mois",typeClient:x.typeClient||"—"};
    });

    const analyses=rows.map(function(lc){
      const vente=byNum[lc.num];
      const ann=annByNum[lc.num];
      const installDCO=round2(installs[lc.num]||0);

      if(lc.isAnnulation){
        return {
          type:"annulation",
          num:lc.num,nom:lc.nom,catpub:lc.catpub,
          statut:ann?"ok":"warning",
          title:ann?"Annulation retrouvée":"Annulation DCO non retrouvée dans TBR",
          dco:0,tbr:0,ecart:0,sous:0,
          dcoMeta:{nb:lc.nb,engagement:lc.engagement,caPacks:lc.caPacks,comVente:lc.comVente,comPacks:lc.comPacks,install:installDCO,offre:lc.offre},
          tbrMeta:ann?{nom:ann.nomClient||ann.nomClientAnn||"Annulation TBR",num:ann.numClientAnn||ann.numClient||lc.num,typeVente:ann.typeVente,typeClient:ann.typeClient,installation:false,total:0}:null,
          detail:ann?"Annulation présente côté TBR.":"Le DCO annule ce client, mais je ne trouve pas l'annulation correspondante dans tes saisies."
        };
      }

      if(!vente){
        const montantDCO=round2(lc.comVente+lc.comPacks+installDCO);
        return {
          type:"missing_tbr",
          num:lc.num,nom:lc.nom,catpub:lc.catpub,
          statut:"warning",
          title:"Client payé dans le DCO mais absent des saisies TBR",
          dco:montantDCO,tbr:0,ecart:montantDCO,verseEnMoins:0,verseEnPlus:montantDCO,sous:0,
          dcoMeta:{nb:lc.nb,engagement:lc.engagement,caPacks:lc.caPacks,comVente:lc.comVente,comPacks:lc.comPacks,install:installDCO,offre:lc.offre},
          tbrMeta:null,
          detail:"Impossible de vérifier le montant : ajoute ou corrige le numéro client dans TBR."
        };
      }

      const r=calcCommission(vente,ip);
      // Le DCO inscrit le malus matériel offert dans la colonne COM Packs.
      // On classe donc -10 € par pack offert dans la ligne Packs, sans modifier le total TBR.
      const offeredPackCount=(vente.packs||[]).filter(p=>p.statutMat==="Offert").length;
      const offeredPackPenalty=round2(-10*offeredPackCount);
      // La colonne COM Packs du DCO est un montant NET : commission sur CA packs + forfaits packs offerts.
      // On garde les deux composantes séparées pour l'explication, puis on compare uniquement le net au DCO.
      const packsCommissionTBR=round2(r.packs||0);
      const promoAbo=r.promoAbo||getPromoAboInfo(vente,ip);
      const packsBeforePromoTBR=round2((r.caPacks||0)*0.25*ip);
      const promoAboImpact=round2(-(promoAbo.commissionImpact||0));
      const packsNetTBR=round2(packsCommissionTBR+offeredPackPenalty);
      const otherMalus=round2((r.malus||0)-offeredPackPenalty);
      const kitTBR=round2((r.kit||0)+(r.bonus||0)+otherMalus);
      const packsTBR=packsNetTBR;
      const installTBR=round2(vente.installation?((r.install)||0):0);

      const ecKit=round2((lc.comVente||0)-kitTBR);
      const ecPacks=round2((lc.comPacks||0)-packsTBR);
      const ecInstall=round2(installDCO-installTBR);

      const sousPacks=ecPacks<-0.99?Math.abs(ecPacks):0;
      const sousInstall=ecInstall<-0.99?Math.abs(ecInstall):0;
      const sousKit=ecKit<-0.99?Math.abs(ecKit):0;
      const ecartTotal=round2(ecKit+ecPacks+ecInstall);
      const verseEnMoins=round2([ecKit,ecPacks,ecInstall].filter(x=>x<-.99).reduce((s,x)=>s+Math.abs(x),0));
      const verseEnPlus=round2([ecKit,ecPacks,ecInstall].filter(x=>x>.99).reduce((s,x)=>s+x,0));
      const statut=verseEnMoins>0?"danger":(verseEnPlus>0?"warning":"ok");

      return {
        type:"matched",
        num:lc.num,nom:lc.nom,catpub:lc.catpub,vente:vente,
        statut:statut,
        title:statut==="ok"?"Conforme":"Écart détecté",
        dco:round2(lc.comVente+lc.comPacks+installDCO),
        tbr:round2(kitTBR+packsTBR+installTBR),
        ecart:ecartTotal,
        verseEnMoins:verseEnMoins,verseEnPlus:verseEnPlus,
        sous:sousPacks+sousInstall,
        sousKit:sousKit,
        dcoMeta:{nb:lc.nb,engagement:lc.engagement,caPacks:lc.caPacks,comVente:lc.comVente,comPacks:lc.comPacks,install:installDCO,offre:lc.offre},
        tbrMeta:{nom:vente.nomClient,num:vente.numClient,typeVente:vente.typeVente,typeClient:vente.typeClient,partenaire:!!vente.partenaire,partenaireNom:vente.partenaireNom,partenaireCategorie:vente.partenaireCategorie,partenaireCA:vente.partenaireCA,installation:!!vente.installation,commissionVente:kitTBR,commissionPacksBrute:packsBeforePromoTBR,promoAboCode:promoAbo.code,promoAboMois:promoAbo.months,promoAboMensuelHT:round2(promoAbo.monthlyHT),promoAboDeductionCAHT:round2(promoAbo.deductionCAHT),promoAboImpactCommission:promoAboImpact,caPacksBrut:round2(r.caPacks||0),caPacksNet:round2((r.caPacksNet??r.caPacks)||0),malusPacksOfferts:offeredPackPenalty,nbPacksOfferts:offeredPackCount,commissionPacks:packsTBR,commissionInstall:installTBR,total:round2(kitTBR+packsTBR+installTBR)},
        lines:[
          {label:"Commission vente",dco:round2(lc.comVente),tbr:kitTBR,ecart:ecKit,niveau:"C — dépend du type client / engagement / saisie"},
          {label:"Packs nets",dco:round2(lc.comPacks),tbr:packsTBR,ecart:ecPacks,niveau:`A — CA packs ${money(r.caPacks||0)}${promoAbo.months?` - promo ${promoAbo.months} mois à -50% (${money(promoAbo.deductionCAHT)}) = ${money(r.caPacksNet)}`:""} · 25% = ${money(packsCommissionTBR)}${offeredPackCount?` · ${offeredPackCount} pack(s) offert(s) = ${money(offeredPackPenalty)}`:""}`},
          {label:"Installation",dco:installDCO,tbr:installTBR,ecart:ecInstall,niveau:"A — contrôle fiable"}
        ],
        detail:"Comparaison faite avec tes saisies TBR du mois détecté."
      };
    });

    const rowNums={};
    rows.forEach(r=>{if(r&&r.num&&!r.isAnnulation) rowNums[r.num]=true;});
    active.forEach(function(vente){
      const n=normNum(vente.numClient);
      if(!n || rowNums[n]) return;
      const r=calcCommission(vente,ip);
      // Le DCO inscrit le malus matériel offert dans la colonne COM Packs.
      // On classe donc -10 € par pack offert dans la ligne Packs, sans modifier le total TBR.
      const offeredPackCount=(vente.packs||[]).filter(p=>p.statutMat==="Offert").length;
      const offeredPackPenalty=round2(-10*offeredPackCount);
      // La colonne COM Packs du DCO est un montant NET : commission sur CA packs + forfaits packs offerts.
      // On garde les deux composantes séparées pour l'explication, puis on compare uniquement le net au DCO.
      const packsCommissionTBR=round2(r.packs||0);
      const promoAbo=r.promoAbo||getPromoAboInfo(vente,ip);
      const packsBeforePromoTBR=round2((r.caPacks||0)*0.25*ip);
      const promoAboImpact=round2(-(promoAbo.commissionImpact||0));
      const packsNetTBR=round2(packsCommissionTBR+offeredPackPenalty);
      const otherMalus=round2((r.malus||0)-offeredPackPenalty);
      const kitTBR=round2((r.kit||0)+(r.bonus||0)+otherMalus);
      const packsTBR=packsNetTBR;
      const installTBR=round2(vente.installation?((r.install)||0):0);
      const totalTBR=round2(kitTBR+packsTBR+installTBR);
      if(totalTBR<1) return;
      analyses.push({
        type:"missing_dco",
        num:n,nom:vente.nomClient||"Client TBR",catpub:vente.typeVente||"",
        vente:vente,statut:"danger",
        title:"Client saisi dans TBR mais absent du DCO",
        dco:0,tbr:totalTBR,ecart:-totalTBR,verseEnMoins:totalTBR,verseEnPlus:0,sous:round2(totalTBR),sousKit:kitTBR,
        dcoMeta:null,
        tbrMeta:{nom:vente.nomClient,num:vente.numClient,typeVente:vente.typeVente,typeClient:vente.typeClient,partenaire:!!vente.partenaire,partenaireNom:vente.partenaireNom,partenaireCategorie:vente.partenaireCategorie,partenaireCA:vente.partenaireCA,installation:!!vente.installation,commissionVente:kitTBR,commissionPacksBrute:packsBeforePromoTBR,promoAboCode:promoAbo.code,promoAboMois:promoAbo.months,promoAboMensuelHT:round2(promoAbo.monthlyHT),promoAboDeductionCAHT:round2(promoAbo.deductionCAHT),promoAboImpactCommission:promoAboImpact,caPacksBrut:round2(r.caPacks||0),caPacksNet:round2((r.caPacksNet??r.caPacks)||0),malusPacksOfferts:offeredPackPenalty,nbPacksOfferts:offeredPackCount,commissionPacks:packsTBR,commissionInstall:installTBR,total:totalTBR},
        lines:[
          {label:"Commission vente",dco:0,tbr:kitTBR,ecart:round2(0-kitTBR),niveau:"C — à vérifier si la vente devait être dans ce DCO"},
          {label:"Packs nets",dco:0,tbr:packsTBR,ecart:round2(0-packsTBR),niveau:`A — CA packs ${money(r.caPacks||0)}${promoAbo.months?` - promo ${promoAbo.months} mois à -50% (${money(promoAbo.deductionCAHT)}) = ${money(r.caPacksNet)}`:""} · 25% = ${money(packsCommissionTBR)}${offeredPackCount?` · ${offeredPackCount} pack(s) offert(s) = ${money(offeredPackPenalty)}`:""}`},
          {label:"Installation",dco:0,tbr:installTBR,ecart:round2(0-installTBR),niveau:"A — installation attendue TBR"}
        ],
        detail:"Cette vente existe dans tes saisies TBR du mois détecté, mais je ne retrouve pas son numéro client dans le DCO importé."
      });
    });

    const rowByNum={};
    rows.forEach(r=>{if(r&&r.num) rowByNum[r.num]=r;});

    const installationIssues=[];
    const installationCandidates=[];
    analyses.forEach(a=>{
      const line=(a.lines||[]).find(l=>l.label==="Installation");
      if(line&&(Math.abs(Number(line.dco)||0)>=1||Math.abs(Number(line.tbr)||0)>=1)){
        installationCandidates.push({
          num:a.num,
          nom:a.nom||"Client",
          catpub:a.catpub||"",
          dco:round2(line.dco),
          tbr:round2(line.tbr),
          ecart:round2(line.ecart),
          exact:Math.abs(Number(line.ecart)||0)>=1,
          cause:Math.abs(Number(line.ecart)||0)>=1?"Installation différente":"Installation contrôlée"
        });
      }
      if(line&&Math.abs(Number(line.ecart)||0)>=1){
        installationIssues.push({
          num:a.num,
          nom:a.nom||"Client",
          catpub:a.catpub||"",
          dco:round2(line.dco),
          tbr:round2(line.tbr),
          ecart:round2(line.ecart),
          exact:true,
          cause:"Installation différente"
        });
      }
    });
    Object.keys(installs||{}).forEach(num=>{
      if(installationIssues.some(x=>x.num===num)) return;
      const dco=round2(installs[num]||0);
      if(Math.abs(dco)<1) return;
      const row=rowByNum[num];
      const vente=byNum[num];
      if(!vente || !row){
        let tbr=0;
        if(vente){
          const rr=calcCommission(vente,ip);
          tbr=round2(vente.installation?((rr.install)||0):0);
        }

        // Correction DCO installation :
        // Si le n° client existe dans TBR, on reprend la vraie prime installation de la fiche TBR.
        // On ne force plus jamais TBR à 0€ juste parce que la ligne principale DCO n'a pas été relue.
        const missingMainDcoLine=!row;
        const displayTbr=tbr;
        const displayEcart=round2(dco-displayTbr);
        const displayCause=vente
          ?(missingMainDcoLine
            ?"Installation DCO retrouvée par numéro client — fiche TBR retrouvée"
            :"Installation présente DCO et TBR")
          :"Installation DCO non retrouvée dans les ventes TBR";

        if(!installationCandidates.some(x=>x.num===num)){
          installationCandidates.push({
            num:num,
            nom:(row&&row.nom)||(vente&&vente.nomClient)||"Client installation DCO",
            catpub:(row&&row.catpub)||(vente&&vente.typeVente)||"",
            dco:dco,
            tbr:displayTbr,
            ecart:displayEcart,
            exact:true,
            cause:displayCause
          });
        }
        if(Math.abs(displayEcart)>=1){
          installationIssues.push({
            num:num,
            nom:(row&&row.nom)||(vente&&vente.nomClient)||"Client installation DCO",
            catpub:(row&&row.catpub)||(vente&&vente.typeVente)||"",
            dco:dco,
            tbr:displayTbr,
            ecart:displayEcart,
            exact:true,
            cause:displayCause
          });
        }
      }
    });

    const palierVTbr=getPalierVentes(tbrNettes);
    const palierVDTbr=getPalierVD(tbrVD);
    const bonusTbr=getBonusSGP((agent&&agent.statut)||"PLATINIUM",tbrNettes,tbrVD);
    const installTbrByNum={};
    analyses.forEach(a=>{
      const line=(a.lines||[]).find(l=>l.label==="Installation");
      if(line&&a.num) installTbrByNum[a.num]=round2(line.tbr||0);
    });
    Object.keys(installs||{}).forEach(num=>{
      if(installTbrByNum[num]!==undefined) return;
      const vente=byNum[num];
      if(vente){
        const rr=calcCommission(vente,ip);
        installTbrByNum[num]=round2(vente.installation?((rr.install)||0):0);
      }else{
        installTbrByNum[num]=0;
      }
    });
    const installTbrTotal=round2(Object.values(installTbrByNum).reduce((s,v)=>s+Number(v||0),0));
    const tbrComVentes=round2(active.reduce((s,v)=>{const rr=calcCommission(v,ip);return s+Number(rr.kit||0)+Number(rr.bonus||0)+Number(rr.malus||0);},0));
    const tbrComPacks=round2(active.reduce((s,v)=>{const rr=calcCommission(v,ip);return s+Number(rr.packs||0);},0));

    const globalRows=[
      {label:"Ventes brutes",dco:summary.vBrutes,tbr:tbrBrutes,ecart:summary.vBrutes-tbrBrutes,money:false,niveau:"Volume"},
      {label:"Annulations",dco:summary.annuls,tbr:tbrAnnuls,ecart:summary.annuls-tbrAnnuls,money:false,niveau:"Volume"},
      {label:"Ventes nettes",dco:summary.vNettes,tbr:tbrNettes,ecart:summary.vNettes-tbrNettes,money:false,niveau:"Volume"},
      {label:"Ventes directes",dco:summary.vDirectes,tbr:tbrVD,ecart:summary.vDirectes-tbrVD,money:false,niveau:"Volume"},
      {label:"Palier ventes",dco:summary.palierV,tbr:palierVTbr,ecart:round2(summary.palierV-palierVTbr),money:true,niveau:"A"},
      {label:"Palier VD",dco:summary.palierVD,tbr:palierVDTbr,ecart:round2(summary.palierVD-palierVDTbr),money:true,niveau:"A"},
      {label:"Bonus SGP",dco:summary.bonusSGP,tbr:bonusTbr,ecart:round2(summary.bonusSGP-bonusTbr),money:true,niveau:"A"},
      {label:"Installations total",dco:summary.comInstall,tbr:installTbrTotal,ecart:round2(summary.comInstall-installTbrTotal),money:true,niveau:"A"}
    ];

    const sousClients=round2(analyses.reduce((s,a)=>s+(a.sous||0),0));
    const sousKit=round2(analyses.reduce((s,a)=>s+(a.sousKit||0),0));
    const sousGlobal=round2(globalRows.filter(r=>r.money&&r.label!=="Installations total").reduce((s,r)=>s+(r.ecart<0?Math.abs(r.ecart):0),0));
    const nonRetrouves=analyses.filter(a=>a.type==="missing_tbr").length;
    const ecartsClientHorsInstall=round2(analyses.reduce((s,a)=>s+(a.lines||[]).filter(l=>l.label!=="Installation"&&Math.abs(Number(l.ecart)||0)>=1).reduce((x,l)=>x+Math.abs(Number(l.ecart)||0),0),0));
    const ecartInstallGlobal=round2(Math.abs((globalRows.find(r=>r.label==="Installations total")||{}).ecart||0));
    const ecartsGlobauxHorsInstall=round2(globalRows.filter(r=>r.money&&r.label!=="Installations total"&&Math.abs(Number(r.ecart)||0)>=1).reduce((s,r)=>s+Math.abs(Number(r.ecart)||0),0));
    const ecartsAControler=round2(ecartsClientHorsInstall+ecartInstallGlobal+ecartsGlobauxHorsInstall);
    const plusClientHorsInstall=round2(analyses.reduce((s,a)=>s+(a.lines||[]).filter(l=>l.label!=="Installation"&&Number(l.ecart)>0.99).reduce((x,l)=>x+Number(l.ecart||0),0),0));
    const plusInstallGlobal=round2(((globalRows.find(r=>r.label==="Installations total")||{}).ecart||0)>0?((globalRows.find(r=>r.label==="Installations total")||{}).ecart||0):0);
    const plusGlobauxHorsInstall=round2(globalRows.filter(r=>r.money&&r.label!=="Installations total"&&Number(r.ecart)>0.99).reduce((s,r)=>s+Number(r.ecart||0),0));
    const plusDCOAControler=round2(plusClientHorsInstall+plusInstallGlobal+plusGlobauxHorsInstall);
    const anomalies=analyses.filter(a=>a.statut==="danger").length+globalRows.filter(r=>Math.abs(r.ecart)>=1).length+nonRetrouves;
    const clientVerseEnMoins=round2(analyses.reduce((s,a)=>s+Number(a.verseEnMoins||0),0));
    const clientVerseEnPlus=round2(analyses.reduce((s,a)=>s+Number(a.verseEnPlus||0),0));
    const globalMoneyRows=globalRows.filter(r=>r.money&&r.label!=="Installations total");
    const globalVerseEnMoins=round2(globalMoneyRows.filter(r=>Number(r.ecart)<-.99).reduce((s,r)=>s+Math.abs(Number(r.ecart)),0));
    const globalVerseEnPlus=round2(globalMoneyRows.filter(r=>Number(r.ecart)>.99).reduce((s,r)=>s+Number(r.ecart),0));

    return {
      ...summary,
      moisUsed:moisUsed,
      rows:rows,
      analyses:analyses,
      globalRows:globalRows,
      tbrSummary:{vBrutes:tbrBrutes,annuls:tbrAnnuls,vNettes:tbrNettes,vDirectes:tbrVD,comVentes:tbrComVentes,comPacks:tbrComPacks,comInstall:installTbrTotal,palierV:palierVTbr,palierVD:palierVDTbr,bonusSGP:bonusTbr,total:round2(tbrComVentes+tbrComPacks+installTbrTotal+palierVTbr+palierVDTbr+bonusTbr)},
      sousPayeCalculable:round2(sousClients+sousGlobal),
      sousPayeKitAControler:sousKit,
      ecartsAControler:ecartsAControler,
      plusDCOAControler:plusDCOAControler,
      verseEnMoins:round2(clientVerseEnMoins+globalVerseEnMoins),
      verseEnPlus:round2(clientVerseEnPlus+globalVerseEnPlus),
      installationIssues:installationIssues,
      installationCandidates:installationCandidates,
      nonRetrouves:nonRetrouves,
      anomalies:anomalies,
      couverture:rows.filter(r=>!r.isAnnulation).length?Math.round(((rows.filter(r=>!r.isAnnulation).length-nonRetrouves)/rows.filter(r=>!r.isAnnulation).length)*100):0
    };
  }

  const parseDCO=async(file)=>{
    setLoading(true);setErreur(null);setDcoData(null);
    try{
      if(!window.pdfjsLib) throw new Error("Lecteur PDF non chargé. Vérifie ta connexion internet puis réessaie.");
      pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
      const buf=await file.arrayBuffer();
      const pdf=await pdfjsLib.getDocument({data:buf}).promise;
      const p1Lines=pdf.numPages>=1?await readPageLines(pdf,1):[];
      const p2Lines=pdf.numPages>=2?await readPageLines(pdf,2):[];
      const p3Lines=pdf.numPages>=3?await readPageLines(pdf,3):[];
      const p1=p1Lines.join(" ");
      const p2=p2Lines.join(" ");
      const p3=p3Lines.join(" ");
      const summary=parseSummary(p1);
      const moisUsed=summary.moisDoc||moisDCO;
      setMoisDCO(moisUsed);
      const rows=parseClientRows(p2Lines);
      const installs=parseInstallRows(p3);

      const sumComVentes=round2(rows.reduce((s,r)=>s+(r.comVente||0),0));
      const sumComPacks=round2(rows.reduce((s,r)=>s+(r.comPacks||0),0));
      const sumInstalls=round2(Object.values(installs).reduce((s,v)=>s+(Number(v)||0),0));
      if(sumComVentes) summary.comVentes=sumComVentes;
      if(sumComPacks) summary.comPacks=sumComPacks;
      if(sumInstalls) summary.comInstall=sumInstalls;

      if(!summary.moisDoc) throw new Error("Je n'ai pas trouvé le MOIS COMMERCIAL dans le PDF.");
      if(!rows.length) throw new Error("Je n'ai pas réussi à lire les lignes clients du DCO. Le format du PDF est peut-être différent.");

      const raw={summary,rows,installs,moisUsed};
      const analysed=buildAnalysis(summary,rows,installs,moisUsed);
      const importedAt=new Date().toISOString();
      setDcoRaw(raw);
      setDcoData(analysed);
      setDateImport(importedAt);
      SV(DCO_CACHE_KEY,{name:file.name,date:importedAt,month:moisUsed,raw:raw,data:analysed});
    }catch(e){
      setErreur("Analyse DCO impossible : "+(e&&e.message?e.message:e));
    }finally{
      setLoading(false);
    }
  };

  useEffect(()=>{
    if(!dcoRaw||loading) return;
    try{
      const refreshed=buildAnalysis(dcoRaw.summary,dcoRaw.rows,dcoRaw.installs,dcoRaw.moisUsed);
      setDcoData(refreshed);
      SV(DCO_CACHE_KEY,{name:nomFichier,date:dateImport,month:dcoRaw.moisUsed,raw:dcoRaw,data:refreshed});
    }catch(e){}
  },[JSON.stringify(ventesAll),JSON.stringify(aimt)]);

  const deleteDco=()=>{
    if(!confirm("Supprimer le DCO chargé et son analyse ?")) return;
    localStorage.removeItem(DCO_CACHE_KEY);
    setDcoData(null);setDcoRaw(null);setNomFichier(null);setDateImport(null);setErreur(null);
    if(fileRef.current) fileRef.current.value="";
  };

  const VerdictBadge=({statut})=>{
    const cfg=statut==="ok"?["#E8F5E9","#087443","✓"]:statut==="danger"?["#FEE2E2","#B42318","!"]:["#FFF7E6","#B54708","?"];
    return <span className="dco-badge" style={{background:cfg[0],color:cfg[1]}}>{cfg[2]}</span>;
  };


  const analysisRank=(a)=>{
    if(!a) return 9;
    if(a.statut==="danger") return 0;
    if(a.type==="missing_tbr" || a.type==="annulation" && a.statut!=="ok") return 1;
    if(a.statut==="warning") return 2;
    return 9;
  };

  const getDcoAlerts=(data)=>{
    if(!data) return [];
    const alerts=[];

    const pushClient=(a,customLines,customAmount,customDetail)=>{
      const ec=Number(a.ecart||0);
      alerts.push({
        type:"client",
        sign:signClass(ec),
        title:a.nom||"Client",
        sub:`N° ${a.num} · ${a.catpub||""}`,
        amount:customAmount!==undefined?customAmount:signedMoney(ec),
        detail:customDetail||a.title||"Écart détecté",
        lines:customLines&&customLines.length?customLines:[a.detail]
      });
    };

    (data.analyses||[]).forEach(a=>{
      const badLines=(a.lines||[]).filter(l=>Math.abs(Number(l.ecart)||0)>=1);
      if(a.type==="annulation" && a.statut!=="ok"){
        alerts.push({type:"client",sign:"neg",title:a.nom,sub:`N° ${a.num} · ${a.catpub}`,amount:"À vérifier",detail:a.title,lines:[a.detail]});
      }else if(a.type==="missing_tbr"){
        alerts.push({type:"client",sign:"pos",title:a.nom,sub:`N° ${a.num} · ${a.catpub}`,amount:signedMoney(a.dco),detail:a.title,lines:[a.detail]});
      }else if(a.statut!=="ok" || badLines.length){
        pushClient(a,badLines.map(l=>`${l.label} : DCO ${money(l.dco)} · TBR ${money(l.tbr)} · écart ${signedMoney(l.ecart)}`));
      }
    });

    const installGlobal=(data.globalRows||[]).find(r=>r.label==="Installations total" && Math.abs(Number(r.ecart)||0)>=1);
    if(installGlobal){
      const exacts=(data.installationIssues||[]).filter(x=>Math.abs(Number(x.ecart)||0)>=1);
      const candidates=(data.installationCandidates||[]).filter(x=>Math.abs(Number(x.ecart)||0)>=1);
      const source=exacts.length?exacts:candidates;
      const lines=source.slice(0,10).map(x=>{
        const sens=Number(x.ecart)>0?"en plus DCO":"manque possible";
        return `⚠️ N° ${x.num} — ${x.nom||"Client"} · DCO ${money(x.dco)} · TBR ${money(x.tbr)} · ${sens} ${signedMoney(x.ecart)}${x.cause?" · "+x.cause:""}`;
      });
      alerts.push({
        type:"global",
        sign:signClass(installGlobal.ecart),
        title:"Installations : client(s) concerné(s)",
        sub:`DCO ${money(installGlobal.dco)} · TBR ${money(installGlobal.tbr)}`,
        amount:signedMoney(installGlobal.ecart),
        detail:lines.length?"Numéro(s) client(s) à contrôler" : "Écart global détecté",
        lines:lines.length?lines:["Écart global installation détecté, mais aucun client avec écart non nul n\u2019a été identifié automatiquement."]
      });
    }

    (data.globalRows||[]).forEach(r=>{
      if(r.label==="Installations total") return;
      if(Math.abs(Number(r.ecart)||0)<1) return;
      alerts.push({
        type:"global",
        sign:signClass(r.ecart),
        title:r.label,
        sub:`DCO ${r.money?money(r.dco):r.dco} · TBR ${r.money?money(r.tbr):r.tbr}`,
        amount:r.money?signedMoney(r.ecart):String(r.ecart),
        detail:Number(r.ecart)>0.99?"En plus DCO" : "Manque possible à contrôler",
        lines:[]
      });
    });

    const seen={};
    return alerts.filter(a=>{const k=a.type+"|"+a.title+"|"+a.sub+"|"+a.detail; if(seen[k]) return false; seen[k]=true; return true;}).slice(0,12);
  };

  const dcoBadgeText=a=>{
    if(!a) return "À vérifier";
    if(a.type==="missing_dco") return "TBR sans DCO";
    if(a.type==="missing_tbr") return "DCO sans TBR";
    if(a.type==="annulation") return a.statut==="ok"?"Annulation OK":"Annulation à vérifier";
    if(a.statut==="ok") return "Conforme";
    return "Écart à vérifier";
  };
  const dcoVerdictText=a=>{
    if(!a) return "";
    if(a.type==="missing_dco") return "À contrôler : cette fiche existe dans TBR mais n'apparaît pas dans le DCO importé. Vérifie le numéro client, le mois ou l'état d'installation.";
    if(a.type==="missing_tbr") return "Le DCO contient ce client mais TBR ne retrouve pas la fiche. Souvent, c'est un numéro client absent ou mal saisi dans TBR.";
    if(a.type==="annulation") return a.statut==="ok"?"Annulation retrouvée côté TBR." : "Le DCO annule ce client, mais TBR ne retrouve pas l'annulation correspondante.";
    if(a.statut==="ok") return "Aucun écart significatif trouvé sur cette fiche client.";
    return "Regarde les lignes ci-dessous : DCO correspond à ce que Verisure a payé, TBR correspond à ce que tu as enregistré.";
  };
  const detailValue=(v,empty="—")=>{if(v===undefined||v===null||v==="") return empty; return String(v);};

  return (
    <div className="dco-v9">
      <section className="dco-hero">
        <div className="dco-robot-real" aria-hidden="true">
          <div className="dco-ant"></div>
          <div className="dco-head"><span></span><span></span><i></i></div>
          <div className="dco-body"><b>TBR</b></div>
          <div className="dco-arm left"></div>
          <div className="dco-arm right"></div>
        </div>
        <div className="dco-hero-text">
          <div className="v8-eyebrow">Contrôle paie</div>
          <h2>Importe ton DCO, TBR détecte le mois et compare avec tes saisies.</h2>
          <p>Le contrôle sépare les écarts fiables, les packs et les commissions vente à vérifier.</p>
        </div>
      </section>

      <section className="dco-card">
        <div className="dco-upload-row">
          <div>
            <div className="dco-title">PDF DCO</div>
            <div className="dco-sub">{nomFichier?nomFichier:"Aucun fichier chargé"}{dateImport?" · Importé le "+new Date(dateImport).toLocaleString("fr-FR"):""} · Mois actif : {MOIS_NOMS[moisDCO.mois-1]} {moisDCO.annee}</div>
          </div>
          <div className="dco-upload-actions">
            <button className="dco-upload-btn" onClick={()=>fileRef.current.click()}>{nomFichier?"Remplacer":"Importer DCO"}</button>
            {nomFichier&&<button className="dco-delete-btn" onClick={deleteDco}>Supprimer</button>}
          </div>
          <input ref={fileRef} type="file" accept=".pdf" style={{display:"none"}} onChange={e=>{if(e.target.files&&e.target.files[0]){const f=e.target.files[0];setNomFichier(f.name);parseDCO(f);e.target.value="";}}}/>
        </div>
        <div className="dco-mini-note">
          <b>{ventesActives.length} vente(s) TBR trouvée(s) pour {MOIS_NOMS[moisDCO.mois-1]} {moisDCO.annee}.</b>
          {moisActif && (moisActif.annee!==moisDCO.annee || moisActif.mois!==moisDCO.mois) && (
            <span className="dco-month-warn">Le DCO est sur {MOIS_NOMS[moisDCO.mois-1]} {moisDCO.annee}, mais l'en-tête de l'app peut afficher {MOIS_NOMS[moisActif.mois-1]} {moisActif.annee}. Pour voir les ventes, va dans Saisie puis utilise les flèches du mois.</span>
          )}
        </div>
      </section>

      {loading&&<section className="dco-card dco-loading">JUMPER analyse ton PDF et croise avec tes ventes...</section>}
      {erreur&&<section className="dco-card dco-error">{erreur}</section>}

      {dcoData&&(
        <>
          <section className="dco-verdict">
            <div className="dco-verdict-main">
              <span>Verdict</span>
              <strong>{dcoData.anomalies>0?"Contrôle à vérifier":"DCO conforme"}</strong>
              <small>DCO détecté : {MOIS_NOMS[dcoData.moisUsed.mois-1]} {dcoData.moisUsed.annee} · {dcoData.couverture}% des clients DCO retrouvés dans TBR</small>
            </div>
            <div className="dco-verdict-side">
              <div><b>{getDcoAlerts(dcoData).length}</b><span>alertes</span></div>
              <div><b className={(dcoData.verseEnMoins||0)>0?"neg":""}>{money(dcoData.verseEnMoins||0)}</b><span>versé en moins</span></div>
              <div><b className={(dcoData.verseEnPlus||0)>0?"pos":""}>{money(dcoData.verseEnPlus||0)}</b><span>versé en plus</span></div>
            </div>
          </section>

          <section className="dco-card dco-explain-panel">
            <div className="dco-title">Lecture rapide du dossier</div>
            <div className="dco-sub">DCO = ce que Verisure a payé. TBR = ce que tu as enregistré. L'écart explique quoi contrôler.</div>
            <div className="dco-compare-grid">
              <div className="dco-compare-box">
                <span>DCO reçu</span>
                <strong>{money(dcoData.totalDCO)}</strong>
                <small>{dcoData.vNettes} ventes nettes · {dcoData.vDirectes} VD · {money(dcoData.comVentesTotal||((dcoData.comVentes||0)+(dcoData.comPacks||0)))} ventes + packs</small>
              </div>
              <div className="dco-compare-box">
                <span>TBR enregistré</span>
                <strong>{money((dcoData.tbrSummary||{}).total||0)}</strong>
                <small>{(dcoData.tbrSummary||{}).vNettes||0} ventes nettes · {(dcoData.tbrSummary||{}).vDirectes||0} VD · {money(((dcoData.tbrSummary||{}).comVentes||0)+((dcoData.tbrSummary||{}).comPacks||0))} ventes + packs</small>
              </div>
              <div className="dco-compare-box bad">
                <span>Versé en moins</span>
                <strong>{money(dcoData.verseEnMoins||0)}</strong>
                <small>Somme de toutes les lignes négatives, sans compensation avec les montants versés en plus.</small>
              </div>
              <div className="dco-compare-box good">
                <span>Versé en plus</span>
                <strong>{money(dcoData.verseEnPlus||0)}</strong>
                <small>Somme de toutes les lignes positives, affichée séparément.</small>
              </div>
            </div>
            <div className="dco-howto">
              <b>Comment lire :</b>
              <ul>
                <li><b>Versé en moins</b> = total des lignes où le DCO est inférieur à TBR, sans soustraire les lignes versées en plus.</li>
                <li><b>Versé en plus</b> = total des lignes où le DCO est supérieur à TBR, affiché séparément.</li>
                <li><b>DCO sans TBR</b> = Verisure paie un client que tu n'as pas retrouvé dans tes saisies.</li>
                <li><b>TBR sans DCO</b> = tu as saisi un client que le DCO ne montre pas.</li>
              </ul>
            </div>
          </section>

          {getDcoAlerts(dcoData).length>0&&(
            <section className="dco-card dco-alerts-panel">
              <div className="dco-title">Alertes à traiter</div>
              <div className="dco-sub">Les écarts détectés sont regroupés ici pour éviter de chercher dans toute la page.</div>
              <div className="dco-alerts-list">
                {getDcoAlerts(dcoData).map((a,i)=>(
                  <div className={"dco-alert-item "+a.type+" "+(a.sign||"")} key={i}>
                    <div className="dco-alert-num">{i+1}</div>
                    <div className="dco-alert-body">
                      <strong>{a.title}</strong>
                      <span>{a.sub}</span>
                      <em>{a.detail}</em>
                      {a.lines&&a.lines.length>0&&(
                        <ul>{a.lines.map((l,j)=><li key={j}>{l}</li>)}</ul>
                      )}
                    </div>
                    <b className={a.sign||""}>{a.amount}</b>
                  </div>
                ))}
              </div>
            </section>
          )}

          <section className="dco-grid">
            <div className="dco-card">
              <div className="dco-title">Synthèse DCO</div>
              {[
                ["Ventes brutes",dcoData.vBrutes,false],
                ["Annulations",dcoData.annuls,false],
                ["Ventes nettes",dcoData.vNettes,false],
                ["Com. ventes",dcoData.comVentes,true],
                ["Com. packs",dcoData.comPacks,true],
                ["Ventes + packs",dcoData.comVentesTotal||((dcoData.comVentes||0)+(dcoData.comPacks||0)),true],
                ["Installations",dcoData.comInstall,true],
                ["Palier ventes",dcoData.palierV,true],
                ["Palier VD",dcoData.palierVD,true],
                ["Bonus SGP",dcoData.bonusSGP,true],
                ["Total DCO",dcoData.totalDCO,true]
              ].map((r,i)=>(
                <div className="dco-line" key={i}><span>{r[0]}</span><b>{r[2]?money(r[1]):r[1]}</b></div>
              ))}
            </div>

            <div className="dco-card">
              <div className="dco-title">Écarts globaux</div>
              {dcoData.globalRows.map((r,i)=>{
                const bad=Math.abs(r.ecart)>=1;
                const cls=bad?signClass(r.ecart):"";
                return (
                  <div className={"dco-line "+cls} key={i}>
                    <span>{r.label}<em>{r.niveau}</em></span>
                    <b>{r.money?money(r.dco):r.dco} / {r.money?money(r.tbr):r.tbr}</b>
                  </div>
                );
              })}
            </div>
          </section>

          {dcoData.nonRetrouves>0&&(
            <section className="dco-card dco-warning">
              <b>{dcoData.nonRetrouves} client(s) du DCO ne sont pas retrouvés dans tes saisies TBR.</b>
              <span>Corrige le numéro client dans TBR ou ajoute la vente. Sans numéro exact, l'app ne peut pas sécuriser le contrôle.</span>
            </section>
          )}

          <section className="dco-card">
            <div className="dco-title">Contrôle client par client</div>
            <div className="dco-sub">Chaque ligne DCO est comparée au numéro client saisi dans TBR.</div>
            <div className="dco-clients">
              {[...dcoData.analyses].sort((a,b)=>analysisRank(a)-analysisRank(b)).map((a,i)=>(
                <details className={"dco-client "+a.statut} key={i} open={a.statut==="danger"||a.type==="missing_tbr"}>
                  <summary>
                    <VerdictBadge statut={a.statut==="danger"?"danger":a.statut==="ok"?"ok":"warning"}/>
                    <div><strong>{a.nom}</strong><span>N° {a.num} · {a.catpub||"—"} · {dcoBadgeText(a)}</span></div>
                    <b className={signClass(a.type==="matched"?a.ecart:(a.type==="missing_dco"?a.ecart:a.dco))}>{a.type==="matched"?signedMoney(a.ecart):(a.type==="missing_dco"?signedMoney(a.ecart):signedMoney(a.dco))}</b>
                    <span className="dco-open-btn">Voir fiche</span>
                  </summary>
                  <div className="dco-client-panel">
                    <div className="dco-client-headline">
                      <div><span>Résultat client</span><strong className={(a.verseEnMoins||0)>0?"neg":(a.verseEnPlus||0)>0?"pos":"neutral"}>{(a.verseEnMoins||0)>0&&`Versé en moins : ${money(a.verseEnMoins)}`}{(a.verseEnMoins||0)>0&&(a.verseEnPlus||0)>0?" · ":""}{(a.verseEnPlus||0)>0&&`Versé en plus : ${money(a.verseEnPlus)}`}{!(a.verseEnMoins||0)&&!(a.verseEnPlus||0)&&"Conforme"}</strong></div>
                      {a.vente&&onEditClient&&<button className="dco-edit-sale-btn" onClick={()=>onEditClient(a.vente)}>Ouvrir et modifier la fiche TBR</button>}
                    </div>
                    <div className="dco-total-strip">
                      <div><span>DCO</span><b>{a.dcoMeta?money((a.dcoMeta.comVente||0)+(a.dcoMeta.comPacks||0)+(a.dcoMeta.install||0)):"Absent"}</b></div>
                      <div><span>TBR</span><b>{a.tbrMeta?money(a.tbrMeta.total||0):"Absent"}</b></div>
                      <div className="neg"><span>Versé en moins</span><b>{money(a.verseEnMoins||0)}</b></div>
                      <div className="pos"><span>Versé en plus</span><b>{money(a.verseEnPlus||0)}</b></div>
                    </div>
                    <div className="dco-identity-strip"><b>{a.nom||"Client"}</b><span>N° {a.num} · {a.tbrMeta?`${detailValue(a.tbrMeta.typeVente)} · ${detailValue(a.tbrMeta.typeClient)}`:(a.catpub||"—")}{a.tbrMeta&&a.tbrMeta.partenaire?` · Partenaire ${a.tbrMeta.partenaireNom||"—"}`:""}</span></div>
                    {a.vente&&(()=>{const v=a.vente;const cr=calcCommission(v,ip);const packs=Array.isArray(v.packs)?v.packs:[];return <div className="dco-audit-detail">
                      <div className="dco-audit-grid">
                        <div><span>Nom TBR</span><b>{v.nomClient||"—"}</b></div><div><span>N° client</span><b>{v.numClient||"—"}</b></div>
                        <div><span>Vente</span><b>{v.typeVente||"—"}</b></div><div><span>Client</span><b>{v.typeClient||"—"}</b></div>
                        <div><span>Engagement</span><b>{v.partenaire?"Partenaire":`${v.engagement||0} mois`}</b></div><div><span>Statut</span><b>{v.statut||"—"}</b></div>
                        <div><span>IP appliqué</span><b>{Math.round(ip*100)}%</b></div><div><span>Installation</span><b>{v.installation?"Oui":"Non"}</b></div>
                        <div><span>Offre DCO</span><b>{(a.dcoMeta&&a.dcoMeta.offre)||"—"}</b></div><div><span>CATPUB DCO</span><b>{a.catpub||"—"}</b></div>
                        {v.partenaire&&<><div><span>Partenaire</span><b>{v.partenaireNom||"—"}</b></div><div><span>Catégorie partenaire</span><b>{v.partenaireCategorie||"—"}</b></div></>}
                      </div>
                      <div className="dco-audit-title">Détail des packs saisis dans TBR</div>

function mkPioche(){return{id:Date.now()+Math.random(),nom:"",ville:"",origine:"Prospection",source:"",typeVente:"VD",typeClient:"RESI",niveau:"Tiède",statut:"À relancer",relance:new Date().toISOString().slice(0,10),derniereAction:"—",note:""};}
function premiumTag(label,bg,t,b){return <span style={{background:bg,color:t,border:"1px solid "+b,borderRadius:999,padding:"4px 8px",fontSize:10,fontWeight:950,whiteSpace:"nowrap"}}>{label}</span>;}
function originLabel(o){return o==="Manuel"?"Prospection":(o||"Prospection");}
function levelColor(n){return n==="Chaud"?"#c0843e":n==="Tiède"?"#8b5cf6":"#64748b";}
function levelTag(n){
  if(n==="Chaud") return premiumTag("Chaud","rgba(192,132,62,.16)","#fdba74","rgba(192,132,62,.32)");
  if(n==="Tiède") return premiumTag("Tiède","rgba(139,92,246,.16)","#ddd6fe","rgba(139,92,246,.30)");
  return premiumTag("Froid","rgba(100,116,139,.18)","#cbd5e1","rgba(100,116,139,.28)");
}
function statusTag(s){
  if(s==="RDV pris") return premiumTag("RDV pris","rgba(56,189,248,.16)","#bae6fd","rgba(56,189,248,.32)");
  if(s==="À relancer") return premiumTag("À relancer","rgba(167,139,250,.15)","#e9d5ff","rgba(167,139,250,.28)");
  if(s==="À appeler") return premiumTag("À appeler","rgba(148,163,184,.14)","#cbd5e1","rgba(148,163,184,.22)");
  if(s==="Converti") return premiumTag("Converti","rgba(212,175,55,.14)","#fde68a","rgba(212,175,55,.28)");
  return premiumTag(s||"À suivre","rgba(148,163,184,.14)","#cbd5e1","rgba(148,163,184,.22)");
}
function originTag(o){
  const x=originLabel(o);
  if(x==="Parrainage") return premiumTag("Parrainage","rgba(56,189,248,.13)","#bae6fd","rgba(56,189,248,.26)");
  if(x==="Prescripteur") return premiumTag("Prescripteur","rgba(192,132,62,.13)","#fdba74","rgba(192,132,62,.30)");
  if(x==="VF + 3 mois") return premiumTag("VF + 3 mois","rgba(212,175,55,.13)","#fde68a","rgba(212,175,55,.28)");
  if(x==="VF") return premiumTag("VF","rgba(99,102,241,.13)","#c7d2fe","rgba(99,102,241,.26)");
  if(x==="Prospection") return premiumTag("Prospection","rgba(139,92,246,.13)","#ddd6fe","rgba(139,92,246,.26)");
  return premiumTag(x,"rgba(148,163,184,.13)","#cbd5e1","rgba(148,163,184,.22)");
}
function terrainRank(x){
  const today=new Date().toISOString().slice(0,10);
  const s=x.statut||"";
  const lvl=x.niveau||"Tiède";
  // Classement principal : Chaud → Tiède → Froid. Les contacts convertis descendent en bas.
  const lev=s==="Converti"?9:(lvl==="Chaud"?0:lvl==="Tiède"?1:2);
  const stat=s==="RDV pris"?0:(x.relance&&x.relance<=today?1:s==="À appeler"?2:3);
  return [lev,stat,x.relance||"9999-12-31",(x.nom||"").toLowerCase()];
}
function sortTerrain(a,b){const A=terrainRank(a),B=terrainRank(b);for(let i=0;i<A.length;i++){if(A[i]<B[i])return-1;if(A[i]>B[i])return 1;}return 0;}
function fieldWrap(label,children,wide=false){return <div className={wide?"wide":""}><div className="tbr-terrain-label">{label}</div>{children}</div>;}

const TBR_BACKUP_PREFIXES=["cc_","dco_","tbr_","jumper_"];
function tbrCollectBackup(){
  const data={};
  for(let i=0;i<localStorage.length;i++){
    const key=localStorage.key(i);
    if(key&&TBR_BACKUP_PREFIXES.some(prefix=>key.startsWith(prefix))){
      data[key]=localStorage.getItem(key);
    }
  }
  return{
    format:"TBR_BACKUP",
    version:2,
    exportedAt:new Date().toISOString(),
    source:location.href,
    data
  };
}
function tbrDownloadBackup(){
  try{
    const backup=tbrCollectBackup();
    const blob=new Blob([JSON.stringify(backup,null,2)],{type:"application/json"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");
    const d=new Date();
    const stamp=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
    a.href=url;
    a.download=`TBR-sauvegarde-${stamp}.json`;
    document.body.appendChild(a);
    a.click();
    a.remove();
    setTimeout(()=>URL.revokeObjectURL(url),1000);
    alert(`Sauvegarde créée : ${Object.keys(backup.data).length} éléments enregistrés.`);
  }catch(e){
    console.error(e);
    alert("La sauvegarde n'a pas pu être créée.");
  }
}
async function tbrImportBackupFile(file){
  if(!file) return;
  try{
    const text=await file.text();
    const backup=JSON.parse(text);
    if(!backup||backup.format!=="TBR_BACKUP"||!backup.data||typeof backup.data!=="object"){
      throw new Error("format invalide");
    }
    const keys=Object.keys(backup.data).filter(k=>TBR_BACKUP_PREFIXES.some(prefix=>k.startsWith(prefix)));
    if(!keys.length) throw new Error("aucune donnée TBR");
    const ok=confirm(`Importer ${keys.length} éléments dans TBR 2.0 ? Les données portant le même nom seront remplacées.`);
    if(!ok) return;
    keys.forEach(k=>{
      const v=backup.data[k];
      if(typeof v==="string") localStorage.setItem(k,v);
    });
    alert("Import terminé. TBR 2.0 va se recharger avec tes données.");
    location.reload();
  }catch(e){
    console.error(e);
    alert("Ce fichier n'est pas une sauvegarde TBR valide.");
  }
}

        <div style={{background:"rgba(255,255,255,.045)",border:"1px solid rgba(148,163,184,.14)",borderRadius:16,padding:"10px 12px",marginBottom:12,fontSize:12,color:"#cbd5e1",lineHeight:1.5,fontWeight:750}}>
          Sert à appliquer le bon coefficient IP selon tes ventes du mois précédent.
        </div>
        <FR label="Ventes mois précédent"><input type="text" inputMode="numeric" pattern="[0-9]*" value={agent.ventesPrec??""} onChange={e=>{const v=e.target.value.replace(/[^0-9]/g,"");setA("ventesPrec",v===""?"":+v);}} style={INP}/></FR>
        <div className="tbr-ip-panel">

          <small>0→40% · 1→50% · 2→60% · 3→70% · 4→80% · 5→90% · 6+→100%</small>

      </Card>
      <Card title="⚠️ Ventes AIMT / ALIT / ASAT">
        <div style={{background:"#FFF3E0",borderRadius:10,padding:"8px 12px",marginBottom:12,fontSize:12,color:"#E65100",lineHeight:1.6}}>
          Annulations imposées (impayé total, litige…) sur des ventes d'anciens mois. Elles réduisent vos compteurs et paliers du mois en cours.
        </div>
        <div className="aimt-add-row">
          <input id="aimt-client-number" inputMode="numeric" placeholder="N° client annulé" style={INP}/>
          <select id="aimt-sale-type" style={INP}><option value="VD">VD</option><option value="VF">VF</option></select>

          <button onClick={()=>{const n=document.getElementById("aimt-client-number");const t=document.getElementById("aimt-sale-type");const r=document.getElementById("aimt-reason");const num=String(n.value||"").replace(/\D/g,"");if(!num){alert("Saisis le numéro client annulé.");return;}const items=Array.isArray(aimt.items)?aimt.items:[];if(items.some(x=>String(x.numClient)===num)){alert("Ce numéro client est déjà enregistré.");return;}setAimt({...aimt,items:[...items,{id:Date.now()+Math.random(),numClient:num,typeVente:t.value,motif:r.value}],vd:0,vf:0});n.value="";}}>Ajouter</button>
        </div>
        {(Array.isArray(aimt.items)?aimt.items:[]).map(x=><div className="aimt-item" key={x.id}><div><b>N° {x.numClient}</b><span>{x.typeVente} · {x.motif}</span></div><button onClick={()=>setAimt({...aimt,items:aimt.items.filter(i=>i.id!==x.id),vd:0,vf:0})}>Supprimer</button></div>)}
        {(Array.isArray(aimt.items)&&aimt.items.length>0)&&(
          <div style={{background:"#FFEBEE",borderRadius:10,padding:"10px 12px",marginTop:8,fontSize:13,color:"#C62828",fontWeight:600}}>
            Impact : -{aimt.items.length} vente(s) nette(s) · -{aimt.items.filter(x=>x.typeVente==="VD").length} VD sur les paliers
          </div>
        )}
      </Card>
      {/* À PROPOS */}
      <Card title="💾 Sauvegarde et transfert">
        <div style={{fontSize:13,lineHeight:1.55,color:"#cbd5e1",fontWeight:750,marginBottom:12}}>
          Utilise ces deux boutons pour transférer tes ventes, objectifs, réglages, contacts et données DCO vers TBR 2.0.
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
          <button onClick={tbrDownloadBackup} style={{border:"1px solid rgba(56,189,248,.35)",background:"linear-gradient(135deg,#0284c7,#4f46e5)",color:"#fff",borderRadius:15,padding:"13px 12px",fontWeight:950,cursor:"pointer"}}>Exporter mes données</button>
          <button onClick={()=>backupInputRef.current&&backupInputRef.current.click()} style={{border:"1px solid rgba(16,185,129,.35)",background:"linear-gradient(135deg,#059669,#047857)",color:"#fff",borderRadius:15,padding:"13px 12px",fontWeight:950,cursor:"pointer"}}>Importer ma sauvegarde</button>
        </div>
        <input ref={backupInputRef} type="file" accept="application/json,.json" style={{display:"none"}} onChange={async e=>{const f=e.target.files&&e.target.files[0];await tbrImportBackupFile(f);e.target.value="";}}/>
        <div style={{marginTop:11,padding:"10px 12px",borderRadius:14,background:"rgba(251,191,36,.08)",border:"1px solid rgba(251,191,36,.20)",color:"#fde68a",fontSize:11,lineHeight:1.45,fontWeight:800}}>
          Ne bloque pas l'ancien TBR avant d'avoir vérifié que toutes tes ventes sont bien visibles ici.
        </div>
      </Card>

      <Card title="À propos">
        <div style={{textAlign:"center",padding:"8px 0 12px"}}>
          <div style={{display:"inline-flex",padding:8,borderRadius:24,background:"linear-gradient(135deg,rgba(56,189,248,.16),rgba(99,102,241,.18))",border:"1px solid rgba(56,189,248,.24)",boxShadow:"0 18px 42px rgba(56,189,248,.16)",marginBottom:12}}>
            <img src={TBR_LOGO_IMG} alt="TBR" style={{width:78,height:78,borderRadius:22,display:"block",boxShadow:"0 12px 28px rgba(56,189,248,.18)",background:"#07111f"}}/>
          </div>
          <div style={{fontWeight:800,fontSize:18,color:"#f8fafc",marginBottom:4}}>TBR Commission</div>
          <div style={{fontSize:12,color:"#94a3b8",marginBottom:6}}>Version {APP_VERSION}</div>
          <div style={{fontSize:12,color:"#cbd5e1",lineHeight:1.7,marginBottom:16,maxWidth:320,marginLeft:"auto",marginRight:"auto"}}>
            Assistant de suivi des performances commerciales et des commissions. Les résultats restent indicatifs et ne constituent pas un document officiel.
          </div>

        </div>
      </Card>
    </div>
  );
}

function Card({title,children}){return(<div className="deck-card" style={{background:"linear-gradient(135deg,rgba(8,17,31,.94),rgba(15,23,42,.90))",borderRadius:24,overflow:"hidden",boxShadow:"0 22px 55px rgba(2,6,23,.26)",marginBottom:0,border:"1px solid rgba(148,163,184,.22)",color:"#e5eefb"}}>{title&&<div className="deck-card-title" style={{padding:"15px 16px",borderBottom:"1px solid rgba(148,163,184,.18)",fontWeight:900,fontSize:12,letterSpacing:1.1,textTransform:"uppercase",color:"#38bdf8",background:"rgba(255,255,255,.035)"}}>{title}</div>}<div style={{padding:"16px"}}>{children}</div></div>);}
function SL({label}){return <div className="deck-section-label" style={{fontSize:11,fontWeight:950,color:"#38bdf8",letterSpacing:1.1,textTransform:"uppercase",margin:"16px 0 9px"}}>{label}</div>;}
function FR({label,children}){return(<div className="deck-field-row" style={{display:"flex",alignItems:"center",justifyContent:"space-between",gap:10,marginBottom:12}}><label style={{fontSize:13,color:"#cbd5e1",fontWeight:750,flex:"0 0 auto",maxWidth:"42%",lineHeight:1.3}}>{label}</label><div style={{flex:1,minWidth:0}}>{children}</div></div>);}
function Inp({value,onChange,placeholder}){return <input value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder||""} style={INP}/>;}
function Sel({value,options,labels,onChange}){return(<div style={{position:"relative"}}><select value={value} onChange={e=>onChange(e.target.value)} style={{...INP,paddingRight:28}}>{options.map((o,i)=><option key={o} value={o}>{(labels&&labels[i])||o}</option>)}</select><div style={{position:"absolute",right:10,top:"50%",transform:"translateY(-50%)",pointerEvents:"none",fontSize:10,color:"#94a3b8"}}>▼</div></div>);}
function Seg({value,options,labels,onChange}){return(<div className="deck-seg" style={{display:"flex",background:"rgba(2,6,23,.42)",borderRadius:14,padding:4,gap:3,border:"1px solid rgba(148,163,184,.16)"}}>{options.map((o,i)=>(<button key={o} onClick={()=>onChange(o)} style={{flex:1,padding:"9px 5px",border:"none",borderRadius:11,fontSize:11,fontWeight:value===o?900:650,background:value===o?"linear-gradient(135deg,#38bdf8,#6366f1)":"transparent",color:value===o?"#fff":"#cbd5e1",cursor:"pointer",transition:"all 0.15s",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{(labels&&labels[i])||o}</button>))}</div>);}
function Tog({label,value,onChange,color="#38bdf8"}){return(<div className="deck-toggle-row" style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"9px 0",borderBottom:"1px solid rgba(148,163,184,.12)",marginBottom:4}}><span style={{fontSize:13,color:"#cbd5e1",flex:1,marginRight:10,lineHeight:1.3,fontWeight:700}}>{label}</span><div onClick={()=>onChange(!value)} style={{width:46,height:27,background:value?"linear-gradient(135deg,#38bdf8,#6366f1)":"rgba(148,163,184,.22)",borderRadius:14,position:"relative",cursor:"pointer",transition:"background 0.2s",flexShrink:0,border:"1px solid rgba(255,255,255,.12)"}}><div style={{position:"absolute",top:3,left:value?21:3,width:21,height:21,background:"#fff",borderRadius:11,boxShadow:"0 1px 6px rgba(0,0,0,0.35)",transition:"left 0.2s"}}/></div></div>);}
function Tag({color,children}){const C={red:{bg:"rgba(248,113,113,.16)",t:"#fecaca",b:"rgba(248,113,113,.28)"},green:{bg:"rgba(16,185,129,.16)",t:"#a7f3d0",b:"rgba(16,185,129,.28)"},blue:{bg:"rgba(56,189,248,.16)",t:"#bae6fd",b:"rgba(56,189,248,.28)"},grey:{bg:"rgba(148,163,184,.16)",t:"#cbd5e1",b:"rgba(148,163,184,.22)"},orange:{bg:"rgba(251,191,36,.16)",t:"#fde68a",b:"rgba(251,191,36,.28)"}};const c=C[color]||C.grey;return <span style={{background:c.bg,color:c.t,border:"1px solid "+c.b,borderRadius:7,padding:"2px 7px",fontSize:10,fontWeight:850,whiteSpace:"nowrap"}}>{children}</span>;}
const INP={background:"rgba(2,6,23,.45)",border:"1px solid rgba(148,163,184,.22)",borderRadius:12,color:"#f8fafc",fontSize:13,padding:"10px 12px",width:"100%",outline:"none",boxSizing:"border-box"};

ReactDOM.render(<App/>,document.getElementById("root"));
</script>


<script id="tbr-v8-scroll-guard">
(function(){
  function unlock(){
    document.documentElement.style.overflowY = "auto";
    document.documentElement.style.height = "auto";
    document.body.style.overflowY = "auto";
    document.body.style.height = "auto";
    document.body.style.position = "static";
    var root=document.getElementById("root");
    if(root){root.style.height="auto";root.style.overflow="visible";}
    var shell=document.querySelector(".tbr-shell");
    if(shell){
      shell.style.height="auto";
      shell.style.maxHeight="none";
      shell.style.overflow="visible";
      shell.style.position="relative";
    }
  }
  window.addEventListener("load", unlock);
  document.addEventListener("DOMContentLoaded", unlock);
  setTimeout(unlock,300);
  setTimeout(unlock,1200);
})();
</script>


<script id="tbr-responsive-keyboard-v8">
(function(){
  function setViewportHeight(){
    var h = window.visualViewport ? window.visualViewport.height : window.innerHeight;
    document.documentElement.style.setProperty('--tbr-viewport-h', h + 'px');
  }

  function isEditable(el){
    if(!el) return false;
    var tag = (el.tagName || '').toLowerCase();
    return tag === 'input' || tag === 'textarea' || tag === 'select' || el.isContentEditable;
  }

  function revealActive(){
    var el = document.activeElement;
    if(!isEditable(el)) return;
    document.body.classList.add('tbr-keyboard-open');
    setTimeout(function(){
      try{
        el.scrollIntoView({block:'center', inline:'nearest', behavior:'smooth'});
      }catch(e){
        el.scrollIntoView(true);
      }
    }, 90);
    setTimeout(function(){
      try{
        el.scrollIntoView({block:'center', inline:'nearest', behavior:'smooth'});
      }catch(e){}
    }, 330);
  }

  function closeKeyboardState(){
    setTimeout(function(){
      if(!isEditable(document.activeElement)){
        document.body.classList.remove('tbr-keyboard-open');
      }
    }, 120);
  }

  setViewportHeight();
  window.addEventListener('resize', setViewportHeight, {passive:true});
  window.addEventListener('orientationchange', function(){
    setTimeout(setViewportHeight, 250);
    setTimeout(revealActive, 350);
  }, {passive:true});

  if(window.visualViewport){
    window.visualViewport.addEventListener('resize', function(){
      setViewportHeight();
      revealActive();
    }, {passive:true});
    window.visualViewport.addEventListener('scroll', function(){
      setViewportHeight();
    }, {passive:true});
  }

  document.addEventListener('focusin', function(e){
    if(isEditable(e.target)) revealActive();
  }, true);

  document.addEventListener('focusout', closeKeyboardState, true);

  document.addEventListener('click', function(e){
    if(isEditable(e.target)) revealActive();
  }, true);
})();
</script>


<script id="tbr-install-banner-v82-script">
(function(){
  const DISMISS_KEY = "tbr_install_dismissed_until_v82";
  const INSTALL_KEY = "tbr_install_seen_v82";

  function isStandalone(){
    return window.matchMedia("(display-mode: standalone)").matches || window.navigator.standalone === true;
  }

  function isIOS(){
    return /iphone|ipad|ipod/i.test(navigator.userAgent || "") && !window.MSStream;
  }

  function isMobileLike(){
    return window.matchMedia("(max-width: 900px)").matches || /android|iphone|ipad|ipod/i.test(navigator.userAgent || "");
  }

  function dismissed(){
    const until = Number(localStorage.getItem(DISMISS_KEY) || 0);
    return Date.now() < until;
  }

  function dismiss(days){
    localStorage.setItem(DISMISS_KEY, String(Date.now() + days*24*60*60*1000));
    hideBox();
  }

  let deferredPrompt = null;
  let box = null;

  function getLogo(){
    const icon = document.querySelector('link[rel="apple-touch-icon"]') || document.querySelector('link[rel="icon"]');
    return icon ? icon.href : "";
  }

  function createBox(mode){
    if(box) return box;

    box = document.createElement("div");
    box.className = "tbr-install-box" + (mode === "ios" ? " ios" : "");
    box.innerHTML = `
      <div class="tbr-install-inner">
        <img class="tbr-install-logo" alt="TBR">
        <div class="tbr-install-copy">
          <div class="tbr-install-title">Installe TBR comme une vraie appli</div>
          <div class="tbr-install-sub">Ajoute-la à ton écran d’accueil pour l’ouvrir directement.</div>
        </div>
      </div>
      <div class="tbr-install-actions">
        <button class="tbr-install-btn tbr-install-primary" type="button">Installer maintenant</button>
        <button class="tbr-install-btn tbr-install-secondary" type="button">Plus tard</button>
      </div>
      <div class="tbr-ios-help">
        Sur iPhone/iPad : appuie sur <b>Partager</b> puis <b>Ajouter à l’écran d’accueil</b>.
      </div>
    `;

    document.body.appendChild(box);
    const img = box.querySelector(".tbr-install-logo");
    if(img) img.src = getLogo();

    const primary = box.querySelector(".tbr-install-primary");
    const secondary = box.querySelector(".tbr-install-secondary");

    if(primary){
      primary.addEventListener("click", async function(){
        if(deferredPrompt){
          deferredPrompt.prompt();
          try{ await deferredPrompt.userChoice; }catch(e){}
          deferredPrompt = null;
          localStorage.setItem(INSTALL_KEY, "1");
          hideBox();
        }
      });
    }

    if(secondary){
      secondary.addEventListener("click", function(){ dismiss(7); });
    }

    return box;
  }

  function showBox(mode){
    if(isStandalone() || dismissed()) return;
    const b = createBox(mode);
    setTimeout(()=>b.classList.add("show"), 80);
  }

  function hideBox(){
    if(box) box.classList.remove("show");
  }

  window.addEventListener("beforeinstallprompt", function(e){
    e.preventDefault();
    deferredPrompt = e;
    if(isStandalone() || dismissed()) return;
    showBox("native");
  });

  window.addEventListener("appinstalled", function(){
    localStorage.setItem(INSTALL_KEY, "1");
    dismiss(365);
  });

  window.addEventListener("load", function(){
    if(isStandalone() || dismissed()) return;

    // iPhone/iPad : pas de prompt natif, on affiche une aide courte.
    if(isIOS()){
      setTimeout(function(){ showBox("ios"); }, 1200);
      return;
    }

    // Android/Desktop : si le navigateur n'envoie pas encore beforeinstallprompt,
    // on affiche un rappel discret après quelques secondes.
    if(isMobileLike()){
      setTimeout(function(){
        if(!deferredPrompt && !isStandalone() && !dismissed()){
          showBox("info");
        }
      }, 3000);
    }
  });
})();
</script>


<script id="tbr-menu-plus-fix-v88-script">
(function(){
  function isBottomNavTarget(el){
    return !!(el && el.closest && el.closest(".tbr-bottom-nav"));
  }

  function unlockMenu(){
    document.body.classList.remove("tbr-keyboard-open");
    const nav = document.querySelector(".tbr-bottom-nav");
    if(nav){
      nav.style.display = "flex";
      nav.style.visibility = "visible";
      nav.style.opacity = "1";
      nav.style.pointerEvents = "auto";
    }
  }

  document.addEventListener("pointerdown", function(e){
    if(isBottomNavTarget(e.target)){
      unlockMenu();
      const active = document.activeElement;
      if(active && active.blur) active.blur();
    }
  }, true);

  document.addEventListener("click", function(e){
    if(isBottomNavTarget(e.target)){
      unlockMenu();
    }
  }, true);

  document.addEventListener("touchstart", function(e){
    if(isBottomNavTarget(e.target)){
      unlockMenu();
    }
  }, true);

  window.addEventListener("pageshow", unlockMenu);
  window.addEventListener("orientationchange", function(){
    setTimeout(unlockMenu, 250);
  });
})();
</script>
