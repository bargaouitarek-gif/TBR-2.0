name: TBR PDF direct browser test

on:
  push:
    branches: [tbr-pdf-import-test]
    paths:
      - '.github/workflows/tbr-pdf-direct-test.yml'
      - 'tools/inject_pdf_test_direct.py'
      - 'tools/smoke_pdf_import.mjs'
      - 'tbr-pdf-import-test.js'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout test branch
        uses: actions/checkout@v4
        with:
          ref: tbr-pdf-import-test
          fetch-depth: 0

      - name: Inject test into stable TBR
        run: python3 tools/inject_pdf_test_direct.py

      - name: Static safety checks
        run: |
          grep -q 'tbr-pdf-import-test.js?v=6' index.html
          grep -q 'label="FI200 Start"' index.html
          grep -q 'function App()' index.html
          ! grep -q 'id="tbr-app"' index.html

      - name: Install browser test dependencies
        run: |
          npm init -y >/dev/null 2>&1
          npm install --no-save playwright@1.52.0 pdf-lib@1.17.1
          npx playwright install --with-deps chromium

      - name: Run real browser smoke test
        run: |
          python3 -m http.server 4173 >/tmp/tbr-server.log 2>&1 &
          sleep 2
          node tools/smoke_pdf_import.mjs

      - name: Upload proof screenshot
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tbr-pdf-browser-proof
          path: tbr-pdf-smoke.png
          if-no-files-found: ignore

      - name: Commit tested copy
        run: |
          if git diff --quiet -- index.html; then
            echo 'Test copy already current'
            exit 0
          fi
          git config user.name 'TBR Test Automation'
          git config user.email 'actions@users.noreply.github.com'
          git add index.html
          git commit -m 'Activate browser-tested PDF import copy'
          git push origin HEAD:tbr-pdf-import-test
